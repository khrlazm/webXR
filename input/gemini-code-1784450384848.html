<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Last Audience - Three.js XR Theatre</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050301;
            font-family: 'Courier New', Courier, monospace;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #fallback-ui {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #d4af37;
            text-align: center;
            pointer-events: none;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.8);
            font-size: 18px;
            font-weight: bold;
            max-width: 80%;
        }
    </style>
    <!-- Three.js and WebXR Polyfill/Controllers -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="fallback-ui">Initializing Balairong Seri...</div>

    <script>
        // --- State Management Engine ---
        const STATE = {
            PHASE: 'INIT', // INIT, SCENE_I, GAMEPLAY_A, SCENE_II, GAMEPLAY_B, SCENE_III, END
            timer: 0,
            hotspotsViewed: { tuahKris: false, jebatKris: false, throne: false, blood: false },
            rhythmHits: 0,
            rhythmTotal: 0,
            activeClashCircle: null
        };

        // --- Core Application Variables ---
        let scene, camera, renderer, clock;
        let listener, rainSound, ambientSound, drumSound, gongSound, dialogueSound;
        let tuah, jebat, throne, bloodStain;
        let hotspots = [];
        let torches = [];
        let raycaster, tempMatrix;
        let controller1, controller2;
        let controllerGrip1, controllerGrip2;
        let uiText;

        // --- Script & Dialogue Engine ---
        const SUBTITLES = {
            SCENE_I_START: "Minister: Hang Tuah has returned.",
            SCENE_I_MID: "Minister: We thought him dead.\nJebat: Dead? Loyalty buries men before swords do.",
            SCENE_I_END: "Tuah: Jebat.\nJebat: Brother.",
            GAMEPLAY_A_PROMPT: "[Gameplay Phase A] Examine the 4 golden hotspots around the room to proceed.",
            SCENE_II_1: "Jebat: What is loyalty without justice?",
            SCENE_II_2: "Tuah: Justice cannot survive without order.",
            SCENE_II_3: "Jebat: Order built on fear is no kingdom.\nTuah: Then what remains?",
            SCENE_II_4: "Jebat: Conscience.",
            GAMEPLAY_B_PROMPT: "[Gameplay Phase B] The Duel! Aim raycast at the glowing rings and click Trigger to keep rhythm!",
            SCENE_III_1: "Jebat: Tell me... Did I betray the Sultan... or save his kingdom?",
            SCENE_III_2: "Tuah cannot answer. Jebat falls.",
            SCENE_III_END: "Kingdoms remember victories. People remember grief."
        };

        init();
        animate();

        function init() {
            const container = document.getElementById('canvas-container');
            uiText = document.getElementById('fallback-ui');

            // --- 1. Scene Setup ---
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0603);
            scene.fog = new THREE.FogExp2(0x0a0603, 0.08);

            // --- 2. Camera & Audio Listener ---
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 50);
            camera.position.set(0, 1.6, 3); 
            
            listener = new THREE.AudioListener();
            camera.add(listener);

            // --- 3. Renderer & WebXR ---
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.xr.enabled = true;
            container.appendChild(renderer.domElement);

            document.body.appendChild(importXRButton());

            // --- 4. Lighting & Environment Setup ---
            const ambient = new THREE.AmbientLight(0x110d0a, 0.6);
            scene.add(ambient);

            // Create Palace Torches
            createTorch(-4, 2, -5);
            createTorch(4, 2, -5);
            createTorch(-5, 2, 0);
            createTorch(5, 2, 0);

            buildPalaceArchitecture();

            // --- 5. Characters & Actors Setup ---
            buildActors();

            // --- 6. Interaction Rigging ---
            raycaster = new THREE.Raycaster();
            tempMatrix = new THREE.Matrix4();
            setupXRControllers();

            // --- 7. Audio Initialization ---
            setupProceduralAudio();

            // --- 8. Begin Production Sequence ---
            clock = new THREE.Clock();
            changePhase('SCENE_I');

            window.addEventListener('resize', onWindowResize);
        }

        // --- Custom XR Button Generator ---
        function importXRButton() {
            const button = document.createElement('button');
            button.innerHTML = 'ENTER STAGE (XR)';
            button.style.position = 'absolute';
            button.style.bottom = '60px';
            button.style.left = '50%';
            button.style.transform = 'translateX(-50%)';
            button.style.padding = '12px 24px';
            button.style.background = '#d4af37';
            button.style.border = '1px solid #5a4218';
            button.style.color = '#110d0a';
            button.style.fontSize = '16px';
            button.style.fontWeight = 'bold';
            button.style.cursor = 'pointer';
            
            button.addEventListener('click', () => {
                if (navigator.xr) {
                    navigator.xr.requestSession('immersive-vr', { optionalFeatures: ['local-floor'] }).then((session) => {
                        renderer.xr.setSession(session);
                        // Resume audio contexts if suspended
                        if(listener.context.state === 'suspended') listener.context.resume();
                    });
                } else {
                    uiText.innerText = "WebXR not supported on this browser/device.";
                }
            });
            return button;
        }

        // --- Environment Construction (Balairong Seri) ---
        function buildPalaceArchitecture() {
            // Highly polished dark timber floor
            const floorGeo = new THREE.PlaneGeometry(16, 20);
            const floorMat = new THREE.MeshStandardMaterial({ 
                color: 0x1c120c, 
                roughness: 0.2, 
                metalness: 0.1 
            });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // Intricately carved wooden pillars
            const pillarGeo = new THREE.CylinderGeometry(0.2, 0.25, 6, 8);
            const pillarMat = new THREE.MeshStandardMaterial({ color: 0x2a1a10, roughness: 0.6 });
            
            const positions = [
                [-4, 3, -5], [4, 3, -5],
                [-4, 3, 0], [4, 3, 0],
                [-4, 3, 5], [4, 3, 5]
            ];
            
            positions.forEach(pos => {
                const pillar = new THREE.Mesh(pillarGeo, pillarMat);
                pillar.position.set(pos[0], pos[1], pos[2]);
                pillar.castShadow = true;
                pillar.receiveShadow = true;
                scene.add(pillar);
            });

            // The Throne Platform (Singgahsana)
            const throneGroup = new THREE.Group();
            throneGroup.position.set(0, 0, -8);

            const steps = new THREE.Mesh(new THREE.BoxGeometry(4, 0.4, 3), pillarMat);
            steps.position.y = 0.2;
            steps.receiveShadow = true;
            throneGroup.add(steps);

            const chairMat = new THREE.MeshStandardMaterial({ color: 0x8a640f, metalness: 0.3, roughness: 0.4 });
            const chair = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1), chairMat);
            chair.position.y = 1.1;
            chair.castShadow = true;
            throneGroup.add(chair);
            
            scene.add(throneGroup);
            throne = chair; // Hook for interaction target

            // Atmospheric Royal Background Ministers (Static silhouettes)
            const ministerGeo = new THREE.CylinderGeometry(0.2, 0.3, 1.5, 6);
            const ministerMat = new THREE.MeshStandardMaterial({ color: 0x120a06, roughness: 0.9 });
            for(let i = 0; i < 6; i++) {
                const m = new THREE.Mesh(ministerGeo, ministerMat);
                m.position.set(i % 2 === 0 ? -4.5 : 4.5, 0.75, -2 - (i * 1.5));
                scene.add(m);
            }
        }

        function createTorch(x, y, z) {
            const torchGroup = new THREE.Group();
            torchGroup.position.set(x, y, z);

            const holder = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.02, 0.6), new THREE.MeshStandardMaterial({color: 0x3a3a3a}));
            holder.rotation.z = x > 0 ? -0.3 : 0.3;
            torchGroup.add(holder);

            const fireLight = new THREE.PointLight(0xff7722, 1.2, 10);
            fireLight.position.set(0, 0.4, 0);
            fireLight.castShadow = true;
            fireLight.shadow.bias = -0.002;
            torchGroup.add(fireLight);

            // Procedural Flame Object
            const flame = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.3, 4), new THREE.MeshBasicMaterial({color: 0xffaa44}));
            flame.position.set(0, 0.4, 0);
            torchGroup.add(flame);

            scene.add(torchGroup);
            torches.push({ group: torchGroup, light: fireLight, baseIntensity: 1.2 });
        }

        // --- Actor Configuration & Setup ---
        function buildActors() {
            // Hang Tuah (Represented in royal deep blue and gold sash)
            tuah = new THREE.Group();
            const tuahBody = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.3, 1.7, 8), new THREE.MeshStandardMaterial({color: 0x0f1a34}));
            tuahBody.position.y = 0.85;
            tuahBody.castShadow = true;
            tuah.add(tuahBody);
            const tuahHead = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8), new THREE.MeshStandardMaterial({color: 0xd2a172}));
            tuahHead.position.y = 1.8;
            tuah.add(tuahHead);
            
            // Custom Tanjak (Headgear)
            const tanjakT = new THREE.Mesh(new THREE.ConeGeometry(0.18, 0.2, 4), new THREE.MeshStandardMaterial({color: 0x0f1a34}));
            tanjakT.position.y = 2.0;
            tanjakT.rotation.z = 0.2;
            tuah.add(tanjakT);

            tuah.position.set(0, 0, 4); // Enters far downstage
            scene.add(tuah);

            // Hang Jebat (Represented in rebellious off-white and gold sash)
            jebat = new THREE.Group();
            const jebatBody = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.3, 1.7, 8), new THREE.MeshStandardMaterial({color: 0x5c534c}));
            jebatBody.position.y = 0.85;
            jebatBody.castShadow = true;
            jebat.add(jebatBody);
            const jebatHead = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8), new THREE.MeshStandardMaterial({color: 0xd2a172}));
            jebatHead.position.y = 1.8;
            jebat.add(jebatHead);
            
            const tanjakJ = new THREE.Mesh(new THREE.ConeGeometry(0.18, 0.2, 4), new THREE.MeshStandardMaterial({color: 0x8a640f}));
            tanjakJ.position.y = 2.0;
            tanjakJ.rotation.z = -0.2;
            jebat.add(tanjakJ);

            jebat.position.set(0, 0, -3); // Stays near upstage center
            scene.add(jebat);

            // Interactive Environment Props for Phase A
            bloodStain = new THREE.Mesh(new THREE.CircleGeometry(0.4, 8), new THREE.MeshStandardMaterial({color: 0x4a0000, roughness: 0.9}));
            bloodStain.rotation.x = -Math.PI/2;
            bloodStain.position.set(1, 0.01, -2);
            scene.add(bloodStain);
        }

        // --- Phase Initialization Routing ---
        function changePhase(newPhase) {
            STATE.PHASE = newPhase;
            STATE.timer = 0;
            console.log("Phase Transitioned To:", newPhase);

            if (newPhase === 'SCENE_I') {
                uiText.innerText = SUBTITLES.SCENE_I_START;
            } 
            else if (newPhase === 'GAMEPLAY_A') {
                uiText.innerText = SUBTITLES.GAMEPLAY_A_PROMPT;
                spawnHotspotsPhaseA();
            } 
            else if (newPhase === 'SCENE_II') {
                clearHotspots();
                uiText.innerText = SUBTITLES.SCENE_II_1;
            } 
            else if (newPhase === 'GAMEPLAY_B') {
                uiText.innerText = SUBTITLES.GAMEPLAY_B_PROMPT;
            } 
            else if (newPhase === 'SCENE_III') {
                if(STATE.activeClashCircle) scene.remove(STATE.activeClashCircle);
                uiText.innerText = SUBTITLES.SCENE_III_1;
            }
            else if (newPhase === 'END') {
                uiText.innerText = SUBTITLES.SCENE_III_END;
            }
        }

        // --- Interactive Gameplay Phase A Infrastructure ---
        function spawnHotspotsPhaseA() {
            // Interactive nodes floating over core stage elements
            createHotspotNode('tuahKris', tuah.position.clone().add(new THREE.Vector3(0, 1.2, -0.4)));
            createHotspotNode('jebatKris', jebat.position.clone().add(new THREE.Vector3(0, 1.2, 0.4)));
            createHotspotNode('throne', throne.parent.position.clone().add(new THREE.Vector3(0, 1.8, 1.2)));
            createHotspotNode('blood', bloodStain.position.clone().add(new THREE.Vector3(0, 0.5, 0)));
        }

        function createHotspotNode(id, position) {
            const geo = new THREE.SphereGeometry(0.15, 8, 8);
            const mat = new THREE.MeshBasicMaterial({color: 0xd4af37, wireframe: true});
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.copy(position);
            mesh.userData = { id: id, isHotspot: true };
            scene.add(mesh);
            hotspots.push(mesh);
        }

        function clearHotspots() {
            hotspots.forEach(h => scene.remove(h));
            hotspots = [];
        }

        function triggerHotspotExploration(id) {
            if(STATE.PHASE !== 'GAMEPLAY_A') return;
            
            STATE.hotspotsViewed[id] = true;
            
            if (id === 'tuahKris') uiText.innerText = "The weapon of duty. Forged to defend structural law.";
            if (id === 'jebatKris') uiText.innerText = "The weapon of justice. Unleashed against systemic betrayal.";
            if (id === 'throne') uiText.innerText = "Empty. Power remains absolute, hidden behind the royal veil.";
            if (id === 'blood') uiText.innerText = "Yesterday's structural justice. Today's dynamic rebellion.";

            // Audio acknowledgment feedback loop
            playGongSound(600, 0.3);

            // Verification Check to advance Narrative Arc
            if(STATE.hotspotsViewed.tuahKris && STATE.hotspotsViewed.jebatKris && STATE.hotspotsViewed.throne && STATE.hotspotsViewed.blood) {
                setTimeout(() => { changePhase('SCENE_II'); }, 4000);
            }
        }

        // --- Interactive Gameplay Phase B Mechanics ---
        function spawnRhythmTargetCircle() {
            if(STATE.activeClashCircle) scene.remove(STATE.activeClashCircle);

            // Calculate current midpoint between moving actors
            const midpoint = new THREE.Vector3().addVectors(tuah.position, jebat.position).multiplyScalar(0.5);
            midpoint.y = 1.3; // Height of core blade action

            const geo = new THREE.RingGeometry(0.3, 0.4, 32);
            const mat = new THREE.MeshBasicMaterial({color: 0xffaa00, side: THREE.DoubleSide, transparent: true, opacity: 0.8});
            const ring = new THREE.Mesh(geo, mat);
            ring.position.copy(midpoint);
            ring.lookAt(camera.position);

            ring.userData = { isRhythmCircle: true, scaleLimit: 0.05, currentScale: 1.5 };
            ring.scale.set(1.5, 1.5, 1.5);

            scene.add(ring);
            STATE.activeClashCircle = ring;
            STATE.rhythmTotal++;
        }

        function verifyRhythmTriggerInteraction() {
            if(!STATE.activeClashCircle) return;
            
            const currentScale = STATE.activeClashCircle.scale.x;
            // Evaluates precision near threshold targets
            if(currentScale > 0.6 && currentScale < 1.1) {
                STATE.rhythmHits++;
                uiText.innerText = "CLASH! Rhythm Maintained Perfectly.";
                playDrumSound(90, 0.4);
                playGongSound(880, 0.15);
                
                // Visual spark confirmation accentuation
                STATE.activeClashCircle.material.color.setHex(0x00ff88);
            } else {
                uiText.innerText = "MISS! The performance stumbles.";
                playDrumSound(50, 0.2);
            }

            setTimeout(() => {
                if(STATE.activeClashCircle) {
                    scene.remove(STATE.activeClashCircle);
                    STATE.activeClashCircle = null;
                }
            }, 150);
        }

        // --- WebXR Input Routing ---
        function setupXRControllers() {
            controller1 = renderer.xr.getController(0);
            controller1.addEventListener('selectstart', onSelectStart);
            scene.add(controller1);

            controller2 = renderer.xr.getController(1);
            controller2.addEventListener('selectstart', onSelectStart);
            scene.add(controller2);

            // Laser pointers for selection accuracy
            const lineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-5)]);
            const lineMat = new THREE.LineBasicMaterial({color: 0xd4af37});
            const line1 = new THREE.Line(lineGeo, lineMat);
            const line2 = new THREE.Line(lineGeo, lineMat);
            controller1.add(line1);
            controller2.add(line2);
        }

        function onSelectStart(event) {
            const controller = event.target;
            tempMatrix.identity().extractRotation(controller.matrixWorld);
            
            raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
            raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);

            if (STATE.PHASE === 'GAMEPLAY_A') {
                const intersects = raycaster.intersectObjects(hotspots);
                if(intersects.length > 0) {
                    triggerHotspotExploration(intersects[0].object.userData.id);
                }
            } 
            else if (STATE.PHASE === 'GAMEPLAY_B') {
                if(STATE.activeClashCircle) {
                    const intersects = raycaster.intersectObjects([STATE.activeClashCircle]);
                    if(intersects.length > 0) {
                        verifyRhythmTriggerInteraction();
                    }
                }
            }
        }

        // --- Procedural Audio Synthesizer (Zero External Assets) ---
        function setupProceduralAudio() {
            // Generates environmental elements natively via Web Audio API 
            const ctx = listener.context;
            
            // Continuous rain simulator
            const bufferSize = 2 * ctx.sampleRate;
            const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                output[i] = Math.random() * 2.0 - 1.0;
            }
            
            const whiteNoise = ctx.createBufferSource();
            whiteNoise.buffer = noiseBuffer;
            
            const filter = ctx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(400, ctx.currentTime);
            
            const gain = ctx.createGain();
            gain.gain.setValueAtTime(0.04, ctx.currentTime);
            
            whiteNoise.connect(filter);
            filter.connect(gain);
            gain.connect(ctx.destination);
            whiteNoise.loop = true;
            whiteNoise.start();
        }

        function playDrumSound(freq, duration) {
            const ctx = listener.context;
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
            
            gain.gain.setValueAtTime(0.5, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + duration);
        }

        function playGongSound(freq, duration) {
            const ctx = listener.context;
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            
            gain.gain.setValueAtTime(0.2, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + duration);
        }

        // --- Window Adapters ---
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- Real-Time Performance & Core Timeline Loop ---
        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render() {
            const delta = clock.getDelta();
            STATE.timer += delta;

            // 1. Procedural Flickering Torch Environment Simulation
            torches.forEach(t => {
                t.light.intensity = t.baseIntensity + (Math.random() - 0.5) * 0.15;
            });

            // 2. Linear Narrative and Play Phase Engine
            if (STATE.PHASE === 'SCENE_I') {
                // Actor Entrances & Setup
                if(STATE.timer > 0 && STATE.timer < 4) {
                    // Tuah advances into the hall at a measured pace
                    if(tuah.position.z > 1.5) tuah.position.z -= delta * 0.6;
                }
                if(STATE.timer >= 4 && STATE.timer < 9) {
                    uiText.innerText = SUBTITLES.SCENE_I_MID;
                }
                if(STATE.timer >= 9 && STATE.timer < 13) {
                    uiText.innerText = SUBTITLES.SCENE_I_END;
                }
                if(STATE.timer >= 13) {
                    changePhase('GAMEPLAY_A');
                }
            } 
            else if (STATE.PHASE === 'GAMEPLAY_A') {
                // Animate structural spinning interactive nodes
                hotspots.forEach(h => {
                    h.rotation.y += delta * 1.5;
                    h.rotation.x += delta * 0.5;
                });
            } 
            else if (STATE.PHASE === 'SCENE_II') {
                // Tense philosophical tracking rotation movements
                tuah.position.set(Math.sin(STATE.timer * 0.4) * 1.5, 0, Math.cos(STATE.timer * 0.4) * 1.5 - 1);
                jebat.position.set(-Math.sin(STATE.timer * 0.4) * 1.5, 0, -Math.cos(STATE.timer * 0.4) * 1.5 - 1);

                if(STATE.timer >= 4 && STATE.timer < 8) uiText.innerText = SUBTITLES.SCENE_II_2;
                if(STATE.timer >= 8 && STATE.timer < 12) uiText.innerText = SUBTITLES.SCENE_II_3;
                if(STATE.timer >= 12 && STATE.timer < 15) {
                    uiText.innerText = SUBTITLES.SCENE_II_4;
                    // Atmospheric Shift: Douse dynamic interior side illumination elements
                    torches[2].light.intensity = 0;
                    torches[3].light.intensity = 0;
                }
                if(STATE.timer >= 15) {
                    changePhase('GAMEPLAY_B');
                }
            } 
            else if (STATE.PHASE === 'GAMEPLAY_B') {
                // Rapid physical combat simulation kinematics
                tuah.position.set(Math.sin(STATE.timer * 2.5) * 1.2, 0, Math.cos(STATE.timer * 2.5) * 0.5 - 1);
                jebat.position.set(-Math.sin(STATE.timer * 2.5) * 1.2, 0, -Math.cos(STATE.timer * 2.5) * 0.5 - 1);

                // Spawns tracking rhythm circles periodically every 2 seconds
                if(Math.floor(STATE.timer) % 2 === 0 && !STATE.activeClashCircle && STATE.timer < 18) {
                    spawnRhythmTargetCircle();
                }

                // Smooth structural reduction of interactive target scaling over time
                if(STATE.activeClashCircle) {
                    const data = STATE.activeClashCircle.userData;
                    data.currentScale -= delta * 0.7;
                    STATE.activeClashCircle.scale.set(data.currentScale, data.currentScale, data.currentScale);
                    
                    if(data.currentScale <= data.scaleLimit) {
                        scene.remove(STATE.activeClashCircle);
                        STATE.activeClashCircle = null;
                    }
                }

                if(STATE.timer >= 20) {
                    changePhase('SCENE_III');
                }
            } 
            else if (STATE.PHASE === 'SCENE_III') {
                // Tragic Resolution Climax Kinematics
                if(STATE.timer < 4) {
                    // Jebat collapses onto the floorboards
                    if(jebat.rotation.z > -Math.PI/2.2) jebat.rotation.z -= delta * 0.5;
                    if(jebat.position.y > 0.1) jebat.position.y -= delta * 0.3;
                    
                    // Tuah kneels beside him downcast
                    if(tuah.position.z < jebat.position.z + 0.8) tuah.position.z += delta * 0.4;
                }
                if(STATE.timer >= 5 && STATE.timer < 10) {
                    uiText.innerText = SUBTITLES.SCENE_III_2;
                }
                if(STATE.timer >= 10) {
                    changePhase('END');
                }
            }
            else if (STATE.PHASE === 'END') {
                // Global cinematic lighting dim down to complete dark void
                torches.forEach(t => {
                    if(t.light.intensity > 0) t.light.intensity -= delta * 0.2;
                });
                scene.background.lerp(new THREE.Color(0x000000), delta * 0.2);
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
