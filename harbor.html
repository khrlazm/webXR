<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Syahbandar's Window</title>
<style>
  :root{
    --lacquer:#241209; --lacquer2:#3a1f10; --paper:#e9d9ae; --paper2:#d8c28c;
    --brass:#c9a227; --ink:#2c1d10; --indigo:#3a3f77; --sea:#1e5f6e;
  }
  html,body{margin:0;height:100%;overflow:hidden;background:#000;
    font-family:Georgia,'Times New Roman',serif;}
  #app{position:fixed;inset:0;}
  canvas{display:block;}

  /* ---- Daftar Dagang : the ledger panel ---- */
  #panel{
    position:fixed;top:14px;left:14px;width:270px;color:var(--ink);
    background:linear-gradient(160deg,var(--paper) 0%,var(--paper2) 100%);
    border:2px solid var(--lacquer2);border-radius:4px;
    box-shadow:0 8px 30px rgba(0,0,0,.55), inset 0 0 40px rgba(120,80,20,.18);
    user-select:none;z-index:10;
  }
  #panel::before{content:"";position:absolute;inset:5px;border:1px solid rgba(60,30,10,.45);
    border-radius:2px;pointer-events:none;}
  #panel h1{
    margin:0;padding:10px 14px 4px;font-size:15px;letter-spacing:.14em;color:var(--lacquer);
    text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;
  }
  #panel h1 small{display:block;font-size:10px;letter-spacing:.06em;color:#6b4a22;
    text-transform:none;font-style:italic;}
  #collapse{cursor:pointer;border:1px solid var(--lacquer2);background:none;color:var(--lacquer);
    font:12px Georgia;border-radius:3px;width:20px;height:20px;line-height:1;}
  .body{padding:6px 14px 12px;}
  .row{margin:9px 0 3px;font-size:11.5px;letter-spacing:.08em;color:#5a3c18;
    text-transform:uppercase;display:flex;justify-content:space-between;}
  .row .val{color:var(--lacquer);font-variant-numeric:tabular-nums;}
  input[type=range]{width:100%;-webkit-appearance:none;background:transparent;margin:2px 0 0;}
  input[type=range]::-webkit-slider-runnable-track{height:4px;background:#8a6a35;border-radius:2px;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;margin-top:-5px;
    border-radius:50%;background:var(--brass);border:2px solid var(--lacquer2);cursor:pointer;}
  input[type=range]::-moz-range-track{height:4px;background:#8a6a35;border-radius:2px;}
  input[type=range]::-moz-range-thumb{width:12px;height:12px;border-radius:50%;
    background:var(--brass);border:2px solid var(--lacquer2);cursor:pointer;}
  .seg{display:flex;gap:4px;margin-top:4px;}
  .seg button{
    flex:1;padding:5px 0;font:11px Georgia;letter-spacing:.04em;cursor:pointer;
    color:var(--paper);background:var(--lacquer2);border:1px solid #1c0e05;border-radius:3px;
  }
  .seg button.on{background:var(--brass);color:var(--lacquer);font-weight:bold;
    box-shadow:inset 0 0 6px rgba(0,0,0,.35);}
  #vrbtn{
    width:100%;margin-top:12px;padding:9px 0;font:bold 13px Georgia;letter-spacing:.12em;cursor:pointer;
    color:var(--brass);background:var(--lacquer);border:1px solid var(--brass);border-radius:3px;
    text-transform:uppercase;
  }
  #vrbtn:disabled{opacity:.45;cursor:default;}
  #hint{margin-top:9px;font-size:10.5px;line-height:1.5;color:#6b4a22;font-style:italic;}
  #clockline{margin-top:8px;text-align:center;font-size:12px;color:var(--lacquer);letter-spacing:.06em;}
  #panel.min .body{display:none;}
</style>
</head>
<body>
<div id="app"></div>

<div id="panel">
  <h1><span>Daftar Dagang<small>The Syahbandar's Ledger</small></span>
      <button id="collapse" title="collapse">–</button></h1>
  <div class="body">
    <div class="row"><span>Waktu · Hour</span><span class="val" id="timeval">16:30</span></div>
    <input id="time" type="range" min="0" max="24" step="0.05" value="16.5">
    <div class="row"><span>Peredaran · Cycle</span></div>
    <div class="seg" id="cycleseg">
      <button data-v="0">Still</button>
      <button data-v="0.02" class="on">Slow</button>
      <button data-v="0.22">Swift</button>
    </div>
    <div class="row"><span>Cuaca · Weather</span></div>
    <div class="seg" id="wxseg">
      <button data-w="clear" class="on">Cerah</button>
      <button data-w="cloud">Berawan</button>
      <button data-w="rain">Hujan</button>
      <button data-w="storm">Ribut</button>
    </div>
    <div class="row"><span>Kapal · Ships</span><span class="val" id="shipval">10</span></div>
    <input id="ships" type="range" min="3" max="14" step="1" value="10">
    <div class="row"><span>Ombak · Swell</span><span class="val" id="waveval">1.0</span></div>
    <input id="wave" type="range" min="0.2" max="2.2" step="0.05" value="1">
    <div class="seg" style="margin-top:10px">
      <button id="soundbtn">Sound: Off</button>
    </div>
    <button id="vrbtn" disabled>Checking VR…</button>
    <div id="clockline"></div>
    <div id="hint">Drag to look · WASD to walk the office.<br>
    In VR: left stick walks, right stick snap-turns, right trigger changes the weather, grip hastens the sun.</div>
  </div>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js" } }
</script>
<script type="module">
import * as THREE from 'three';

/* ================================================================
   PELABUHAN MELAKA · c.1470 — view from the Syahbandar's office
   Single-file three.js + WebXR (Quest 2). All geometry procedural.
   ================================================================ */

const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({antialias:true, powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.xr.enabled = true;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x9db7c6, 70, 720);

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.08, 1500);
const rig = new THREE.Group();               // player rig — stands in the office
const FLOOR_Y = 3.0;
rig.position.set(0, FLOOR_Y, 4.6);
camera.position.set(0, 1.65, 0);
rig.add(camera);
scene.add(rig);

addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* ---------------- small helpers ---------------- */
const smooth=(a,b,x)=>{ x=Math.min(1,Math.max(0,(x-a)/(b-a))); return x*x*(3-2*x); };
const lerp=(a,b,t)=>a+(b-a)*t;
/* seeded RNG — same seed, same harbour */
const SEED=(()=>{ const p=new URLSearchParams(location.search).get('seed');
  return p? (parseInt(p)||1337) : ((Math.random()*1e9)|0); })();
const _rng=(s=>()=>{ s|=0; s=s+0x6D2B79F5|0; let t=Math.imul(s^s>>>15,1|s);
  t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; })(SEED);
const rand=(a,b)=>a+_rng()*(b-a);
const TAU=Math.PI*2;

function canvasTex(w,h,draw){
  const c=document.createElement('canvas'); c.width=w; c.height=h;
  draw(c.getContext('2d'),w,h);
  const t=new THREE.CanvasTexture(c);
  t.wrapS=t.wrapT=THREE.RepeatWrapping; t.anisotropy=4; t.colorSpace=THREE.SRGBColorSpace;
  return t;
}
/* wood plank texture */
const woodTex = canvasTex(256,256,(g)=>{
  g.fillStyle='#6a4526'; g.fillRect(0,0,256,256);
  for(let y=0;y<256;y+=32){
    g.fillStyle=`rgb(${90+Math.random()*30|0},${58+Math.random()*20|0},${30+Math.random()*14|0})`;
    g.fillRect(0,y,256,30);
    g.strokeStyle='rgba(30,16,6,.7)'; g.strokeRect(-1,y,258,31);
    for(let i=0;i<40;i++){ g.strokeStyle='rgba(50,30,12,.25)';
      const x=Math.random()*256; g.beginPath(); g.moveTo(x,y+2); g.lineTo(x+rand(-8,8),y+28); g.stroke(); }
  }
});
const woodDark = canvasTex(128,128,(g)=>{
  g.fillStyle='#3a2210'; g.fillRect(0,0,128,128);
  for(let i=0;i<60;i++){ g.strokeStyle='rgba(20,10,4,.5)';
    g.beginPath(); const x=Math.random()*128; g.moveTo(x,0); g.lineTo(x+rand(-6,6),128); g.stroke(); }
});
/* songket-ish diamond motif */
function songket(base, motif){ return canvasTex(256,256,(g)=>{
  g.fillStyle=base; g.fillRect(0,0,256,256);
  g.strokeStyle=motif; g.lineWidth=2;
  for(let y=0;y<=256;y+=32) for(let x=0;x<=256;x+=32){
    g.beginPath(); g.moveTo(x+16,y); g.lineTo(x+32,y+16); g.lineTo(x+16,y+32); g.lineTo(x,y+16); g.closePath(); g.stroke();
    g.fillStyle=motif; g.fillRect(x+14,y+14,4,4);
  }
});}
const carpetTex = songket('#5a1f1f','#c9a227'); carpetTex.repeat.set(2,3);
const valanceTex = songket('#6d1a24','#d8b04a'); valanceTex.repeat.set(4,1);
/* banner with faux-Jawi flourish */
const bannerTex = canvasTex(256,512,(g)=>{
  g.fillStyle='#343a70'; g.fillRect(0,0,256,512);
  g.strokeStyle='#c9a227'; g.lineWidth=5; g.strokeRect(14,14,228,484);
  g.lineWidth=3; g.lineCap='round';
  for(let r=0;r<5;r++){
    const y=90+r*80; g.beginPath();
    let x=50; g.moveTo(x,y);
    for(let i=0;i<7;i++){ const nx=x+rand(14,28);
      g.bezierCurveTo(x+6,y+rand(-26,26), nx-6,y+rand(-26,26), nx, y+rand(-10,10)); x=nx; }
    g.stroke();
    for(let i=0;i<4;i++){ g.beginPath(); g.arc(rand(55,200), y+rand(-30,-16), 2.4, 0, TAU); g.fillStyle='#c9a227'; g.fill(); }
  }
});
/* sail cloth (battened option for junks) */
function sailTex(col, battens){ return canvasTex(256,256,(g)=>{
  g.fillStyle=col; g.fillRect(0,0,256,256);
  g.strokeStyle='rgba(90,70,40,.25)';
  for(let x=0;x<256;x+=8){ g.beginPath(); g.moveTo(x,0); g.lineTo(x,256); g.stroke(); }
  for(let y=0;y<256;y+=8){ g.beginPath(); g.moveTo(0,y); g.lineTo(256,y); g.stroke(); }
  g.strokeStyle='rgba(70,45,20,.5)'; g.lineWidth=2;
  for(let y=20;y<256;y+=44){ g.beginPath(); g.moveTo(0,y); g.lineTo(256,y+rand(-3,3)); g.stroke(); }
  if(battens){ g.strokeStyle='#4a2f14'; g.lineWidth=6;
    for(let y=16;y<256;y+=40){ g.beginPath(); g.moveTo(0,y); g.lineTo(256,y); g.stroke(); } }
});}
/* national flags */
function flagTex(nation){ return canvasTex(128,80,(g)=>{
  const F=(c)=>{g.fillStyle=c;g.fillRect(0,0,128,80);};
  if(nation==='melaka'){ F('#e6b422'); g.fillStyle='#7a1f1f';
    g.beginPath(); g.arc(64,40,18,0,TAU); g.fill(); }
  if(nation==='ming'){ F('#b3202a'); g.fillStyle='#f2c744';
    g.beginPath(); g.arc(64,40,20,0,TAU); g.fill(); }
  if(nation==='gujarat'){ F('#e07b1f'); g.fillStyle='#f6e3b0'; g.fillRect(0,28,128,24); }
  if(nation==='arab'){ F('#1d6e46'); g.fillStyle='#f2ead0';
    g.beginPath(); g.arc(70,40,18,0,TAU); g.fill(); g.fillStyle='#1d6e46';
    g.beginPath(); g.arc(78,40,16,0,TAU); g.fill(); }
  if(nation==='jawa'){ for(let i=0;i<4;i++){ g.fillStyle=i%2?'#f0e6d2':'#a02020'; g.fillRect(0,i*20,128,20);} }
  if(nation==='portugal'){ F('#f2ead8'); g.fillStyle='#a01818';
    g.fillRect(56,8,16,64); g.fillRect(32,32,64,16); }
  if(nation==='ryukyu'){ F('#e8c33a'); g.fillStyle='#b02424';
    g.beginPath(); g.arc(64,40,20,0,TAU); g.fill(); g.fillStyle='#e8c33a';
    g.beginPath(); g.arc(64,40,8,0,TAU); g.fill(); }
  if(nation==='bengal'){ F('#1c4d30'); g.fillStyle='#e0b83a';
    g.beginPath(); g.arc(52,40,16,0,TAU); g.fill(); }
});}

/* ================================================================
   SKY — one shader dome: gradient, sun, moon, stars, fbm clouds
   ================================================================ */
const skyUniforms = {
  uSunDir:  {value:new THREE.Vector3(0,1,0)},
  uMoonDir: {value:new THREE.Vector3(0,-1,0)},
  uTime:    {value:0},
  uCloud:   {value:0.12},
  uStorm:   {value:0},
  uFlash:   {value:0},
};
const skyMat = new THREE.ShaderMaterial({
  side:THREE.BackSide, depthWrite:false, fog:false,
  uniforms:skyUniforms,
  vertexShader:`
    varying vec3 vDir;
    void main(){ vDir = position;
      gl_Position = projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader:`
    varying vec3 vDir;
    uniform vec3 uSunDir,uMoonDir; uniform float uTime,uCloud,uStorm,uFlash;
    float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
    float noise(vec2 p){ vec2 i=floor(p),f=fract(p); f=f*f*(3.-2.*f);
      return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),
                 mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);}
    float fbm(vec2 p){ float v=0.,a=.5;
      for(int i=0;i<4;i++){ v+=a*noise(p); p*=2.03; a*=.5;} return v;}
    void main(){
      vec3 d = normalize(vDir);
      vec3 sd = normalize(uSunDir);
      float sunE = sd.y;
      float day  = smoothstep(-0.08, 0.25, sunE);
      float dusk = clamp(1.0-abs(sunE)/0.35, 0.0, 1.0);
      vec3 zen = mix(vec3(0.018,0.03,0.075), vec3(0.16,0.38,0.70), day);
      vec3 hor = mix(vec3(0.05,0.075,0.13),  vec3(0.72,0.83,0.90), day);
      float sunAmt = max(dot(d,sd),0.0);
      hor = mix(hor, vec3(0.98,0.44,0.18), dusk*pow(sunAmt,2.0)*0.95);
      zen = mix(zen, vec3(0.36,0.20,0.36), dusk*0.45);
      float h = clamp(d.y,0.0,1.0);
      vec3 col = mix(hor, zen, pow(h,0.62));
      col = mix(col, vec3(0.24,0.26,0.30)*(0.25+0.75*day), uStorm*0.72);
      /* clouds */
      float cm = 0.0;
      if(d.y>0.015){
        vec2 p = d.xz/(d.y+0.14);
        p = p*0.5 + vec2(uTime*0.006, uTime*0.0022);
        float f = fbm(p*0.7) * (0.75+0.25*noise(p*3.0+uTime*0.02));
        float th = mix(0.78, 0.34, uCloud);
        cm = smoothstep(th, th+0.26, f) * smoothstep(0.015,0.12,d.y);
      }
      /* stars behind clouds */
      float night = 1.0-day;
      if(night>0.25){
        vec2 sp = vec2(atan(d.z,d.x)*4.0, d.y*8.0);
        vec2 cell = floor(sp*22.0);
        float hh = hash(cell);
        vec2 fp = fract(sp*22.0)-0.5;
        float star = step(0.982,hh)*smoothstep(0.14,0.0,length(fp));
        star *= 0.6+0.4*sin(uTime*2.5+hh*50.0);
        col += star*night*(1.0-cm)*(1.0-uStorm)*vec3(0.85,0.9,1.0);
      }
      /* sun */
      vec3 sunCol = mix(vec3(1.0,0.5,0.22), vec3(1.0,0.95,0.85), smoothstep(0.0,0.3,sunE));
      float disc = smoothstep(0.99930,0.99965,sunAmt);
      float glow = pow(sunAmt,60.0)*0.55 + pow(sunAmt,8.0)*0.16;
      col += (disc*1.4+glow)*sunCol*step(-0.03,sunE)*(1.0-uStorm*0.85)*(1.0-cm*0.85);
      /* moon */
      vec3 md = normalize(uMoonDir);
      float mAmt = max(dot(d,md),0.0);
      float mDisc = smoothstep(0.99950,0.99978,mAmt);
      col += (mDisc + pow(mAmt,90.0)*0.14) * vec3(0.85,0.9,1.0)*night*(1.0-uStorm*0.8)*(1.0-cm*0.9);
      /* cloud blend */
      vec3 cloudCol = mix(vec3(0.32,0.34,0.40), vec3(1.0,0.97,0.92), day);
      cloudCol = mix(cloudCol, vec3(0.95,0.55,0.35), dusk*pow(sunAmt,1.5)*0.6);
      cloudCol = mix(cloudCol, vec3(0.16,0.17,0.20)+day*0.12, uStorm*0.8);
      col = mix(col, cloudCol*(0.22+0.85*day+0.1), cm*0.92);
      col += uFlash*vec3(0.85,0.9,1.0);
      gl_FragColor = vec4(col,1.0);
    }`
});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(900,32,16), skyMat));

/* ================================================================
   LIGHTS
   ================================================================ */
const sunLight = new THREE.DirectionalLight(0xffe8c0, 2.4);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(1024,1024);
sunLight.shadow.bias = -0.0006;
const sc = sunLight.shadow.camera;
sc.left=-26; sc.right=26; sc.top=26; sc.bottom=-26; sc.near=1; sc.far=160;
sunLight.target.position.set(0,2,-4);
scene.add(sunLight, sunLight.target);

const moonLight = new THREE.DirectionalLight(0x9db4e6, 0);
scene.add(moonLight);
const hemi = new THREE.HemisphereLight(0xbcd6ea, 0x3a3226, 0.6);
scene.add(hemi);
const flashLight = new THREE.DirectionalLight(0xdfe8ff, 0);
flashLight.position.set(-60,80,-120); scene.add(flashLight);

/* warm interior lantern + a quay lamp */
const lanternLight = new THREE.PointLight(0xffab3c, 0.3, 16, 1.8);
lanternLight.position.set(1.55, FLOOR_Y+1.35, 1.35); scene.add(lanternLight);
const quayLight = new THREE.PointLight(0xffa030, 0, 26, 1.6);
quayLight.position.set(0, 3.2, -9); scene.add(quayLight);

/* ================================================================
   WATER — analytic waves + fresnel sky + sun/moon glints
   ================================================================ */
const waterUniforms = {
  uTime:{value:0}, uAmp:{value:1},
  uSunDir:{value:new THREE.Vector3(0,1,0)},
  uSunCol:{value:new THREE.Color(1,0.9,0.7)},
  uMoonDir:{value:new THREE.Vector3(0,-1,0)},
  uSkyCol:{value:new THREE.Color(0.7,0.8,0.9)},
  uDeepCol:{value:new THREE.Color(0.05,0.20,0.24)},
  uNight:{value:0},
  uFogColor:{value:new THREE.Color()}, uFogNear:{value:70}, uFogFar:{value:720},
};
const WAVE_GLSL = `
  vec3 waveNP(vec2 p, float t, float amp){
    float w = sin(p.x*0.14+t*0.9)*0.18 + sin(p.y*0.11-t*0.7)*0.14 + sin((p.x+p.y)*0.07+t*0.5)*0.10;
    float dx = 0.14*cos(p.x*0.14+t*0.9)*0.18 + 0.07*cos((p.x+p.y)*0.07+t*0.5)*0.10;
    float dz = 0.11*cos(p.y*0.11-t*0.7)*0.14 + 0.07*cos((p.x+p.y)*0.07+t*0.5)*0.10;
    return vec3(w*amp, dx*amp, dz*amp);
  }`;
const waterMat = new THREE.ShaderMaterial({
  uniforms:waterUniforms,
  vertexShader: WAVE_GLSL + `
    uniform float uTime,uAmp;
    varying vec3 vN; varying vec3 vW;
    void main(){
      vec4 wp = modelMatrix*vec4(position,1.0);
      vec3 wnp = waveNP(wp.xz, uTime, uAmp);
      wp.y += wnp.x;
      vN = normalize(vec3(-wnp.y, 1.0, -wnp.z));
      vW = wp.xyz;
      gl_Position = projectionMatrix*viewMatrix*wp;
    }`,
  fragmentShader:`
    uniform vec3 uSunDir,uSunCol,uMoonDir,uSkyCol,uDeepCol;
    uniform float uTime,uNight;
    uniform vec3 uFogColor; uniform float uFogNear,uFogFar;
    varying vec3 vN; varying vec3 vW;
    float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
    float noise(vec2 p){ vec2 i=floor(p),f=fract(p); f=f*f*(3.-2.*f);
      return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),
                 mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);}
    void main(){
      vec3 n = normalize(vN);
      float n1 = noise(vW.xz*0.6+uTime*0.32);
      float n2 = noise(vW.xz*0.6-uTime*0.27+7.0);
      n = normalize(n + vec3((n1-0.5)*0.34, 0.0, (n2-0.5)*0.34));
      vec3 v = normalize(cameraPosition - vW);
      float fres = pow(1.0-max(dot(v,n),0.0), 3.0);
      vec3 col = mix(uDeepCol, uSkyCol, clamp(fres*0.9+0.08,0.0,1.0));
      vec3 sd = normalize(uSunDir);
      if(sd.y>-0.05){
        vec3 hv = normalize(sd+v);
        col += pow(max(dot(n,hv),0.0), 220.0)*uSunCol*2.2*smoothstep(-0.05,0.1,sd.y);
        col += pow(max(dot(n,hv),0.0), 30.0)*uSunCol*0.14;
      }
      vec3 md = normalize(uMoonDir);
      if(md.y>0.0 && uNight>0.1){
        vec3 hv2 = normalize(md+v);

  const d = z - (4 + 6*Math.sin(x*0.02));
  let h = -1.6 + 3.4*smooth(0,26,d);
  h += smooth(160,380,z)*34;                       // hinterland ridge
  h += Math.sin(x*0.05)*Math.cos(z*0.043)*0.7 + Math.sin(x*0.013+z*0.017)*1.6*smooth(0,20,d);
  return h;
}

function makeHull(L,B,D,col){
  const N=10, verts=[], idx=[];
  for(let s=0;s<N;s++){
    const t=s/(N-1);
    const half=(B/2)*Math.pow(Math.sin(Math.PI*t),0.72);
    const bot=-D*(0.55+0.45*Math.sin(Math.PI*t));
    const deck=D*0.22*(1+1.4*Math.pow(Math.abs(t-0.5)*2,2));
    const z=(t-0.5)*L;              // length along local Z, bow at +Z
    verts.push(-half,deck,z,  -half*0.82,bot*0.55,z,  0,bot,z,  half*0.82,bot*0.55,z,  half,deck,z);
  }
  for(let s=0;s<N-1;s++) for(let k=0;k<4;k++){
    const a=s*5+k,b=a+1,c=a+5,d=a+6;
    idx.push(a,c,b, b,c,d);
  }
  /* deck strip */
  for(let s=0;s<N-1;s++){ const a=s*5,e=s*5+4,c=a+5,g=e+5; idx.push(a,e,c, e,g,c); }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
  geo.setIndex(idx); geo.computeVertexNormals();
  const m=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({color:col,roughness:0.85,side:THREE.DoubleSide}));
  m.castShadow=true;
  return m;
}

function bentSail(w,h,mat){
  const s=new THREE.Mesh(new THREE.PlaneGeometry(w,h,1,6),mat);
  const p=s.geometry.attributes.position;
  for(let i=0;i<p.count;i++) p.setZ(i, Math.sin((p.getY(i)/h+0.5)*Math.PI)*w*0.06);
  s.geometry.computeVertexNormals();
  return s;
}
function triSail(w,h,mat){
  const sh=new THREE.Shape(); sh.moveTo(0,0); sh.lineTo(w,0.15*h); sh.lineTo(0.08*w,h); sh.closePath();
  const s=new THREE.Mesh(new THREE.ShapeGeometry(sh),mat); return s;
}

const anchorSpots=[];
for(let i=0;i<18;i++){
  const a=rand(-1.15,1.15), r=rand(42,120);
  anchorSpots.push({x:Math.sin(a)*r, z:-Math.cos(a)*r-24, used:false});

const TYPES=['junk','dhow','baghlah','jong','perahu','nau','ryukyu','bengal','junk','dhow','perahu','jong','baghlah','perahu'];
const SPEED={junk:3.2, dhow:4.2, baghlah:3.8, jong:2.8, perahu:5.0, nau:3.0, ryukyu:3.3, bengal:3.9};
const fleet=[];
function seaPoint(){ const a=rand(-1.25,1.25), r=300; return new THREE.Vector3(Math.sin(a)*r, 0, -Math.cos(a)*r-20); }
TYPES.forEach((type,i)=>{
  const s=buildShip(type);
  scene.add(s.g);
  const ship={ ...s, type, speed:SPEED[type]*rand(0.85,1.15),
    yaw:0, state:'away', t:rand(0,20), target:new THREE.Vector3(), spot:null, active:i<10, sailUp:1 };
  s.g.visible=false;
  fleet.push(ship);
});
function shipDepart(ship){
  ship.state='out'; ship.target.copy(seaPoint());
  if(ship.spot){ ship.spot.used=false; ship.spot=null; }
}
function shipSpawn(ship){
  const free=anchorSpots.filter(a=>!a.used);
  if(!free.length){ ship.t=rand(4,10); return; }
  const spot=free[(Math.random()*free.length)|0]; spot.used=true;
  ship.spot=spot; ship.state='in';
  const sp=seaPoint(); ship.g.position.set(sp.x,0,sp.z);
  ship.target.set(spot.x,0,spot.z);
  ship.yaw=Math.atan2(ship.target.x-sp.x, ship.target.z-sp.z);
  ship.g.visible=true;
}
function updateFleet(dt,t){
  for(const ship of fleet){
    if(!ship.active){ if(ship.g.visible && ship.state!=='out') shipDepart(ship); }
    if(ship.state==='away'){
      ship.t-=dt;
      if(ship.t<=0 && ship.active) shipSpawn(ship);
      continue;
    }
    const p=ship.g.position;
    if(ship.state==='in'||ship.state==='out'){
      const dx=ship.target.x-p.x, dz=ship.target.z-p.z;
      const dist=Math.hypot(dx,dz);
      const desired=Math.atan2(dx,dz);
      let dy=desired-ship.yaw; while(dy>Math.PI)dy-=TAU; while(dy<-Math.PI)dy+=TAU;
      ship.yaw += dy*Math.min(1, dt*0.55);
      const sp=ship.speed*(ship.state==='in'? Math.min(1, dist/26+0.15) : 1);
      p.x += Math.sin(ship.yaw)*sp*dt;
      p.z += Math.cos(ship.yaw)*sp*dt;
      ship.sailUp=lerp(ship.sailUp, 1, dt*0.8);
      if(ship.state==='in' && dist<3){ ship.state='anchor'; ship.t=rand(30,90); }
      if(ship.state==='out' && dist<14){ ship.state='away'; ship.t=rand(6,26); ship.g.visible=false; }
    } else if(ship.state==='anchor'){
      ship.t-=dt;
      ship.sailUp=lerp(ship.sailUp, 0.12, dt*0.7);
      ship.yaw += Math.sin(t*0.1+p.x)*0.0004;
      if(ship.t<=0 && ship.active) shipDepart(ship);
    }
    /* ride the sea */
    const w0=waveY(p.x,p.z,t);
    p.y = w0*0.55;
    const pitch=(waveY(p.x,p.z-3,t)-waveY(p.x,p.z+3,t))*0.05;
    const roll =(waveY(p.x-3,p.z,t)-waveY(p.x+3,p.z,t))*0.06;
    ship.g.rotation.set(pitch, ship.yaw, roll);
    for(const s of ship.sails) s.scale.y=Math.max(0.1,ship.sailUp);
    if(ship.flag) ship.flag.rotation.y=Math.sin(t*6+p.x)*0.3;
  }
}

/* rain — point streaks in a volume over the harbour mouth */
const rainUniforms={uTime:{value:0}, uOn:{value:0}, uWind:{value:0}};
{
  const N=1400, seeds=new Float32Array(N*3);
  for(let i=0;i<N;i++){ seeds[i*3]=rand(-24,24); seeds[i*3+1]=rand(0,26); seeds[i*3+2]=rand(-20,18); }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(seeds,3));
  const m=new THREE.ShaderMaterial({
    transparent:true, depthWrite:false, uniforms:rainUniforms,
    vertexShader:`
      uniform float uTime,uWind;
      void main(){
        vec3 p=position;
        p.y = mod(p.y - uTime*19.0, 26.0);
        p.x += uWind*p.y*0.35;
        vec4 mv = modelViewMatrix*vec4(p,1.0);
        gl_PointSize = clamp(170.0/-mv.z, 2.0, 30.0);
        gl_Position = projectionMatrix*mv;
      }`,
    fragmentShader:`
      uniform float uOn;
      void main(){
        vec2 c=gl_PointCoord-0.5;
        float a = smoothstep(0.5,0.0,abs(c.x)*7.0)*smoothstep(0.52,0.38,abs(c.y));
        gl_FragColor = vec4(0.62,0.72,0.85, a*0.4*uOn);
      }`
  });
  const rain=new THREE.Points(g,m);
  rain.position.set(0, 1, -14); rain.frustumCulled=false;
  scene.add(rain);
}
/* lightning scheduler */
let flashV=0, nextBolt=rand(5,12);
function updateLightning(dt){

    nextBolt-=dt;
    if(nextBolt<=0){ flashV=1; nextBolt=rand(3,11); if(audioOn) thunder(rand(0.4,2)); }
  }
  flashV=Math.max(0, flashV - dt*4.5);
  skyUniforms.uFlash.value = flashV*0.55;

}

let AC=null, audioOn=false, surfGain=null, rainGain=null;
function noiseBuffer(sec, brown){
  const sr=AC.sampleRate, b=AC.createBuffer(1, sr*sec, sr), d=b.getChannelData(0);
  let last=0;
  for(let i=0;i<d.length;i++){
    const w=Math.random()*2-1;
    if(brown){ last=(last+0.02*w)/1.02; d[i]=last*3.2; } else d[i]=w*0.6;
  }
  return b;
}
function startAudio(){
  AC=new (window.AudioContext||window.webkitAudioContext)();
  const surf=AC.createBufferSource(); surf.buffer=noiseBuffer(4,true); surf.loop=true;
  const lp=AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=380;
  surfGain=AC.createGain(); surfGain.gain.value=0.16;
  const lfo=AC.createOscillator(); lfo.frequency.value=0.09;
  const lfoG=AC.createGain(); lfoG.gain.value=0.06;
  lfo.connect(lfoG).connect(surfGain.gain); lfo.start();
  surf.connect(lp).connect(surfGain).connect(AC.destination); surf.start();
  const rn=AC.createBufferSource(); rn.buffer=noiseBuffer(3,false); rn.loop=true;
  const bp=AC.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=2600; bp.Q.value=0.4;
  rainGain=AC.createGain(); rainGain.gain.value=0;
  rn.connect(bp).connect(rainGain).connect(AC.destination); rn.start();
  /* pasar chatter — murmuring crowd bed, daylight only */
  const ch=AC.createBufferSource(); ch.buffer=noiseBuffer(3,true); ch.loop=true;
  const chBp=AC.createBiquadFilter(); chBp.type='bandpass'; chBp.frequency.value=520; chBp.Q.value=0.9;
  chatterGain=AC.createGain(); chatterGain.gain.value=0;
  const chLfo=AC.createOscillator(); chLfo.frequency.value=0.31;
  const chLfoG=AC.createGain(); chLfoG.gain.value=0.012;
  chLfo.connect(chLfoG).connect(chatterGain.gain); chLfo.start();
  ch.connect(chBp).connect(chatterGain).connect(AC.destination); ch.start();
}
let chatterGain=null;
/* a gull's cry — descending two-note keen */
function gullCry(){
  if(!AC||!audioOn) return;
  const t0=AC.currentTime+0.02, n=1+((Math.random()*2)|0);
  for(let i=0;i<n;i++){
    const s=t0+i*0.34;
    const o=AC.createOscillator(); o.type='sawtooth';
    o.frequency.setValueAtTime(1250+Math.random()*250,s);
    o.frequency.exponentialRampToValueAtTime(640,s+0.3);
    const f=AC.createBiquadFilter(); f.type='bandpass'; f.frequency.value=1100; f.Q.value=3;
    const g=AC.createGain(); g.gain.setValueAtTime(0.0001,s);
    g.gain.exponentialRampToValueAtTime(0.045,s+0.05);
    g.gain.exponentialRampToValueAtTime(0.0001,s+0.32);
    o.connect(f).connect(g).connect(AC.destination); o.start(s); o.stop(s+0.36);
  }
}
/* the beduk — the surau's great drum, struck at waktu solat */
function beduk(){
  if(!AC||!audioOn) return;
  let s=AC.currentTime+0.1, gap=0.9;
  for(let i=0;i<9;i++){
    const o=AC.createOscillator(); o.type='sine';
    o.frequency.setValueAtTime(82,s);
    o.frequency.exponentialRampToValueAtTime(52,s+0.5);
    const g=AC.createGain(); g.gain.setValueAtTime(0.0001,s);
    g.gain.exponentialRampToValueAtTime(0.16,s+0.015);
    g.gain.exponentialRampToValueAtTime(0.0001,s+0.7);
    const th=AC.createBufferSource(); th.buffer=noiseBuffer(0.12,true);
    const tf=AC.createBiquadFilter(); tf.type='lowpass'; tf.frequency.value=300;
    const tg=AC.createGain(); tg.gain.setValueAtTime(0.05,s);
    tg.gain.exponentialRampToValueAtTime(0.0001,s+0.1);
    o.connect(g).connect(AC.destination); o.start(s); o.stop(s+0.8);
    th.connect(tf).connect(tg).connect(AC.destination); th.start(s);
    s+=gap; gap=Math.max(0.22,gap*0.82);   /* the quickening */
  }
}
const WAKTU=[5.75,13.25,16.5,19.3,20.45];
function thunder(delay){
  if(!AC) return;
  const t0=AC.currentTime+delay;
  const src=AC.createBufferSource(); src.buffer=noiseBuffer(2.5,true);
  const lp=AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.setValueAtTime(140,t0);
  lp.frequency.exponentialRampToValueAtTime(60,t0+2.2);
  const g=AC.createGain(); g.gain.setValueAtTime(0.0001,t0);
  g.gain.exponentialRampToValueAtTime(0.5,t0+0.08);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+2.4);
  src.connect(lp).connect(g).connect(AC.destination);
  src.start(t0); src.stop(t0+2.6);
}

/* ================================================================
   DAY / NIGHT — the sun's road over the strait
   ================================================================ */
let hour=16.5, cycleSpeed=0.02;
const _sunDir=new THREE.Vector3(), _moonDir=new THREE.Vector3();
const _horizon=new THREE.Color(), _c1=new THREE.Color(), _c2=new THREE.Color();
function updateDayNight(dt){
  hour=(hour+cycleSpeed*dt)%24; if(hour<0)hour+=24;
  const ang=(hour-6)/12*Math.PI;
  _sunDir.set(Math.cos(ang)*0.9, Math.sin(ang), -0.38).normalize();
  const mang=(hour-18.5)/12*Math.PI;
  _moonDir.set(Math.cos(mang)*0.8, Math.sin(mang), -0.3).normalize();
  const sunE=_sunDir.y;
  const day=smooth(-0.06,0.2,sunE);
  window.__day=day;
  const dusk=Math.max(0,1-Math.abs(sunE)/0.35);
  const night=1-day;
  sunLight.position.copy(_sunDir).multiplyScalar(120).add(new THREE.Vector3(0,0,-4));
  sunLight.intensity=2.6*day*(1-cur.gloom*0.75);
  _c1.setRGB(1,0.92,0.8); _c2.setRGB(1,0.5,0.25);
  sunLight.color.copy(_c1).lerp(_c2,dusk);
  moonLight.position.copy(_moonDir).multiplyScalar(120);
  moonLight.intensity=0.3*night*Math.max(0,_moonDir.y)*(1-cur.gloom*0.7);
  hemi.intensity=0.12+0.55*day*(1-cur.gloom*0.6);
  hemi.color.setRGB(lerp(0.25,0.74,day), lerp(0.3,0.84,day), lerp(0.45,0.92,day));
  /* lanterns wax as the light wanes */
  const lamps=night*0.95+dusk*0.3;
  lanternLight.intensity=0.25+lamps*1.6;
  quayLight.intensity=lamps*1.5;
  window.__lanternCore.color.setHSL(0.09,0.9,0.45+lamps*0.25);
  lampCores.forEach(m=>m.color.setHSL(0.09,0.85, 0.12+lamps*0.5));
  window.__wins.opacity=lamps*0.9;
  for(const ship of fleet) ship.lamp.visible=lamps>0.35&&ship.g.visible;
  /* fog & horizon colour — mirrors the sky shader's mood */
  _horizon.setRGB(lerp(0.05,0.72,day), lerp(0.075,0.83,day), lerp(0.13,0.90,day));
  _c2.setRGB(0.9,0.45,0.22); _horizon.lerp(_c2, dusk*0.4);
  _c2.setRGB(0.24,0.26,0.30); _horizon.lerp(_c2, cur.storm*0.6+cur.gloom*0.3*day);
  scene.fog.color.copy(_horizon);
  scene.fog.near=lerp(70,34,cur.rain);
  scene.fog.far=lerp(740,240,cur.rain*0.8+cur.storm*0.2);
  /* feed shaders */
  skyUniforms.uSunDir.value.copy(_sunDir);
  skyUniforms.uMoonDir.value.copy(_moonDir);
  waterUniforms.uSunDir.value.copy(_sunDir);
  waterUniforms.uMoonDir.value.copy(_moonDir);
  waterUniforms.uSunCol.value.copy(sunLight.color);
  waterUniforms.uSkyCol.value.copy(_horizon);
  waterUniforms.uNight.value=night;
  waterUniforms.uFogColor.value.copy(_horizon);
  waterUniforms.uFogNear.value=scene.fog.near;
  waterUniforms.uFogFar.value=scene.fog.far;
  _c1.setRGB(0.05,0.2,0.24); _c2.setRGB(0.01,0.035,0.06);
  waterUniforms.uDeepCol.value.copy(_c1).lerp(_c2,night);
}

let yaw=0,pitch=0,dragging=false,lx=0,ly=0;

  yaw-=(e.clientX-lx)*0.0042; pitch-=(e.clientY-ly)*0.0042;

function clampRig(){
  rig.position.x=Math.max(-3.3,Math.min(3.3,rig.position.x));
  rig.position.z=Math.max(0.7,Math.min(7.3,rig.position.z));
  rig.position.y=FLOOR_Y;
}
let snapLatch=false, gripLatch=false;
function updateInput(dt){
  if(!renderer.xr.isPresenting){
    camera.rotation.order='YXZ';
    camera.rotation.set(pitch,yaw,0);
    let mx=0,mz=0;
    if(keys['KeyW'])mz-=1; if(keys['KeyS'])mz+=1;
    if(keys['KeyA'])mx-=1; if(keys['KeyD'])mx+=1;
    if(mx||mz){
      const s=2.2*dt;
      rig.position.x+=(Math.sin(yaw)*mz+Math.cos(yaw)*mx)*s;
      rig.position.z+=(Math.cos(yaw)*mz-Math.sin(yaw)*mx)*s;
    }
  } else {
    const session=renderer.xr.getSession();
    if(session){
      for(const src of session.inputSources){
        const gp=src.gamepad; if(!gp)continue;
        const ax=gp.axes[2]||0, ay=gp.axes[3]||0;
        if(src.handedness==='left'){
          if(Math.abs(ax)>0.12||Math.abs(ay)>0.12){
            const dir=new THREE.Vector3();
            camera.getWorldDirection(dir); dir.y=0; dir.normalize();
            const right=new THREE.Vector3(dir.z,0,-dir.x);
            rig.position.addScaledVector(dir,-ay*1.8*dt);
            rig.position.addScaledVector(right,-ax*1.8*dt);
          }
        } else {
          if(Math.abs(ax)>0.6&&!snapLatch){ rig.rotation.y-=Math.sign(ax)*Math.PI/6; snapLatch=true; }
          else if(Math.abs(ax)<0.3) snapLatch=false;
          const grip=gp.buttons[1]&&gp.buttons[1].pressed;
          if(grip&&!gripLatch){ setCycleSpeed(cycleSpeed>0.1?0.02:0.22); }
          gripLatch=grip;
        }
      }
    }
  }
  clampRig();
}

}

/* the physical instrument on the desk */
const panelMesh=new THREE.Mesh(new THREE.PlaneGeometry(0.55,0.73),
  new THREE.MeshStandardMaterial({map:panelTex, roughness:0.85}));
{
  const tilt=-0.48;
  panelMesh.rotation.x=tilt;
  panelMesh.position.set(1.15, F+0.825+0.345*Math.cos(-tilt), 0.98-0.345*Math.sin(-tilt));
  office.add(panelMesh);
  /* lacquered backboard + brass easel struts */
  const back=new THREE.Mesh(new THREE.BoxGeometry(0.61,0.79,0.02), darkWood);
  back.position.copy(panelMesh.position); back.rotation.copy(panelMesh.rotation);
  back.translateZ(-0.013); office.add(back);
  [[-0.2],[0.2]].forEach(([sx])=>{
    const strut=new THREE.Mesh(new THREE.CylinderGeometry(0.008,0.008,0.36,6), brassMat);
    strut.position.set(1.15+sx, F+0.98, 1.12); strut.rotation.x=0.55; office.add(strut);
  });
}

/* ---- pointer logic, shared by VR rays and desktop mouse ----
   targets: the desk instrument, the globe (drag = turn the day),
   the ledger pages (left taps cycle weather, right taps cycle traffic) */
const rayCaster=new THREE.Raycaster();
const _tmpM=new THREE.Matrix4();
const _dialPlane=new THREE.Plane(new THREE.Vector3(0,1,0),0);
const _dialPt=new THREE.Vector3();
const globeGrab=window.__globeGrab, ledgerL=window.__pgL, ledgerR=window.__pgR;
const interactables=[panelMesh, globeGrab, ledgerL, ledgerR];
const TRAFFIC=[5,9,14];
function tapLedgerL(){ const O=['clear','cloud','rain','storm'];
  setWeather(O[(O.indexOf(weather)+1)%4]); }
function tapLedgerR(){ const n=fleet.filter(s=>s.active).length;
  const i=TRAFFIC.findIndex(v=>v>n); setShips(i<0?TRAFFIC[0]:TRAFFIC[i]); }
function hoverIdOf(hit){
  if(hit.object===panelMesh) return regionAt(hit.uv);
  if(hit.object===globeGrab) return '@globe';
  if(hit.object===ledgerL)  return '@pgL';
  if(hit.object===ledgerR)  return '@pgR';
  return null;
}
function regionAt(uv){
  const cx=uv.x*PW, cy=(1-uv.y)*PH;
  for(const id in R){ const r=R[id];
    const pad=(r.kind==='slider')?14:4;
    if(cx>=r.x-pad&&cx<=r.x+r.w+pad&&cy>=r.y-pad&&cy<=r.y+r.h+pad) return id;
  }
  return null;
}
function applySlider(r,uv){
  const cx=uv.x*PW;
  let f=(cx-(r.x+10))/(r.w-20); f=Math.max(0,Math.min(1,f));
  r.set(r.min+f*(r.max-r.min));
}
/* azimuth of the ray's crossing of the globe's horizontal plane */
function dialAz(){
  _dialPlane.constant=-window.__globe.getWorldPosition(_dialPt).y;
  const gw=_dialPt.clone();
  if(rayCaster.ray.intersectPlane(_dialPlane,_dialPt))
    return Math.atan2(_dialPt.x-gw.x, _dialPt.z-gw.z);
  return null;
}
function pressAt(c){
  if(!c.hover)return;
  if(c.hover==='@globe'){ c.dragging='@globe'; c.grabAz=dialAz(); return; }
  if(c.hover==='@pgL'){ tapLedgerL(); return; }
  if(c.hover==='@pgR'){ tapLedgerR(); return; }
  const r=R[c.hover];
  if(r.kind==='slider'){ c.dragging=c.hover; if(c.lastUV) applySlider(r,c.lastUV); }
  else if(r.act) r.act();
}
function dragUpdate(c, panelUV){
  if(c.dragging==='@globe'){
    const az=dialAz();
    if(az!==null && c.grabAz!==null){
      let d=az-c.grabAz; while(d>Math.PI)d-=TAU; while(d<-Math.PI)d+=TAU;
      setHour(hour + d*(12/Math.PI)*0.55);
    }
    c.grabAz=az;
  } else if(c.dragging && panelUV){ applySlider(R[c.dragging],panelUV); }
}
function updateVRPointers(){
  const inVR=renderer.xr.isPresenting;
  for(const c of vrCtrls){ c.ray.visible=inVR; c.gripSpace.visible=inVR; }
  if(!inVR){
    for(const c of vrCtrls){ c.cursor.visible=false; }
    return;
  }
  rig.updateMatrixWorld(true);
  for(const c of vrCtrls){
    _tmpM.identity().extractRotation(c.ray.matrixWorld);
    rayCaster.ray.origin.setFromMatrixPosition(c.ray.matrixWorld);
    rayCaster.ray.direction.set(0,0,-1).applyMatrix4(_tmpM);
    const hit=rayCaster.intersectObjects(interactables,false)[0];
    if(hit){
      c.lastUV=(hit.object===panelMesh)?hit.uv:null;
      const h=hoverIdOf(hit);
      if(h!==c.hover){ c.hover=h; panelDirty=true; }
      c.laser.scale.z=hit.distance;
      c.laser.material.opacity=h?1:0.5;
      c.cursor.visible=true; c.cursor.position.copy(hit.point);
    } else {
      if(c.hover){ c.hover=null; panelDirty=true; }
      c.laser.scale.z=2.5; c.laser.material.opacity=0.35;
      c.cursor.visible=false;
      c.lastUV=null;
    }
    if(c.dragging) dragUpdate(c, c.lastUV);
  }
  applyHoverFX();
}
/* hover glow for the globe and ledger pages */
function anyHover(id){
  if(mouseUI.hover===id) return true;
  for(const c of vrCtrls) if(c.hover===id||c.dragging===id) return true;
  return false;
}
function applyHoverFX(){
  window.__globeBrass.emissive.setHex(anyHover('@globe')?0x664411:0x000000);
  ledgerL.material.emissive.setHex(anyHover('@pgL')?0x332211:0x000000);
  ledgerR.material.emissive.setHex(anyHover('@pgR')?0x332211:0x000000);
}
/* desktop mouse on the same instruments */
const mouseUI={active:false, hover:null, dragging:null, lastUV:null, grabAz:null};
function mouseHit(e){
  const rect=renderer.domElement.getBoundingClientRect();
  const nx=((e.clientX-rect.left)/rect.width)*2-1;
  const ny=-((e.clientY-rect.top)/rect.height)*2+1;
  rayCaster.setFromCamera({x:nx,y:ny},camera);
  return rayCaster.intersectObjects(interactables,false)[0]||null;
}
renderer.domElement.addEventListener('pointerdown',e=>{
  if(renderer.xr.isPresenting)return;
  const hit=mouseHit(e);
  if(hit){
    dragging=false; /* suppress look-drag */
    mouseUI.active=true;
    mouseUI.lastUV=(hit.object===panelMesh)?hit.uv:null;
    mouseUI.hover=hoverIdOf(hit);
    pressAt(mouseUI);
  }
});
addEventListener('pointermove',e=>{
  if(renderer.xr.isPresenting)return;
  if(mouseUI.active&&mouseUI.dragging){
    const hit=mouseHit(e);
    mouseUI.lastUV=(hit&&hit.object===panelMesh)?hit.uv:null;
    if(mouseUI.dragging==='@globe'){ mouseHit(e); /* refresh rayCaster */ dragUpdate(mouseUI,null); }
    else if(mouseUI.lastUV) applySlider(R[mouseUI.dragging],mouseUI.lastUV);
  } else if(!dragging){
    const hit=mouseHit(e);
    const h=hit?hoverIdOf(hit):null;
    if(h!==mouseUI.hover){ mouseUI.hover=h; panelDirty=true; }
    renderer.domElement.style.cursor=h?'pointer':'';
  }
  applyHoverFX();
});
addEventListener('pointerup',()=>{ mouseUI.active=false; mouseUI.dragging=null; mouseUI.grabAz=null; });
drawPanel();

/* ================================================================
   MAIN LOOP
   ================================================================ */
const clock=new THREE.Clock();
let uiTick=0, gullT=4, prevHour=hour;
const rand2=(a,b)=>a+Math.random()*(b-a);   /* runtime randomness, unseeded */
renderer.setAnimationLoop(()=>{
  const dt=Math.min(0.05,clock.getDelta());
  const t=clock.elapsedTime;
  /* weather easing */
  const tgt=WX[weather];
  cur.cloud=lerp(cur.cloud,tgt.cloud,dt*0.4);
  cur.rain =lerp(cur.rain, tgt.rain, dt*0.5);
  cur.wind =lerp(cur.wind, tgt.wind, dt*0.4);
  cur.waves=lerp(cur.waves,tgt.waves,dt*0.3);
  cur.gloom=lerp(cur.gloom,tgt.gloom,dt*0.4);
  cur.storm=lerp(cur.storm,(weather==='storm')?1:0,dt*0.4);
  waveAmp=cur.waves*waveUser;
  skyUniforms.uTime.value=t;
  skyUniforms.uCloud.value=cur.cloud;
  skyUniforms.uStorm.value=cur.storm;
  waterUniforms.uTime.value=t;
  waterUniforms.uAmp.value=waveAmp;
  rainUniforms.uTime.value=t;
  rainUniforms.uOn.value=cur.rain;
  rainUniforms.uWind.value=cur.wind*cur.storm;
  windUniform.value=0.1+cur.wind*0.5;
  if(rainGain) rainGain.gain.value=cur.rain*0.22*(audioOn?1:0);
  if(surfGain) surfGain.gain.value=(0.1+cur.waves*0.07)*(audioOn?1:0);
  if(chatterGain) chatterGain.gain.value=(window.__day||0)*0.035*(1-cur.rain*0.8)*(audioOn?1:0);
  /* gulls by day */
  gullT-=dt;
  if(gullT<=0){ gullT=rand2(3,9); if((window.__day||0)>0.5&&cur.rain<0.4) gullCry(); }
  /* the beduk sounds at each waktu */
  for(const w of WAKTU){
    const crossed=(prevHour<=w&&hour>w)||(prevHour>hour&&(w>prevHour||w<=hour));
    if(crossed){ beduk(); break; }
  }
  prevHour=hour;
  updateLightning(dt);
  updateDayNight(dt);
  updateFleet(dt,t);
  updateSampans(dt,t);
  updateInput(dt);
  updateVRPointers();
  /* small life: folk sway, globe turns */
  for(const f of folk) f.g.position.y+= (Math.sin(t*1.4+f.ph)*0.0016);
  if(window.__globe) window.__globe.rotation.y=hour/24*TAU;
  uiTick+=dt;
  if(uiTick>0.25){ uiTick=0; updateClock(); panelDirty=true; }
  if(panelDirty){ panelDirty=false; drawPanel(); }
  renderer.render(scene,camera);
});
</script>
