<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sketches</title>
<style>
  :root{
    --gold:#d8b45a; --gold-dim:#8a7440;
    --text:#cfd4dc; --muted:#6f7686;
    --line:rgba(216,180,90,.22);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{min-height:100%}
  body{
    background:#050608;
    color:var(--text);
    font-family:Georgia,'Times New Roman',serif;
    display:flex;align-items:center;justify-content:center;
    padding:48px 20px;
    position:relative;
    overflow-x:hidden;
  }

  /* starfield — flying through space */
  #space{
    position:fixed;inset:0;
    width:100%;height:100%;
    pointer-events:none;
    opacity:.9;
  }

  main{
    position:relative;
    width:min(560px, 100%);
  }
  header{ margin-bottom:36px }
  h1{
    font-weight:normal;
    font-size:30px;
    letter-spacing:.4em;
    color:var(--gold);
    text-shadow:0 0 22px rgba(216,180,90,.3);
  }
  header p{
    margin-top:8px;
    font-style:italic;
    font-size:13px;
    letter-spacing:.06em;
    color:var(--muted);
  }

  ul{ list-style:none; border-top:1px solid var(--line) }
  li{ border-bottom:1px solid var(--line) }
  a{
    display:flex;
    align-items:baseline;
    gap:16px;
    padding:18px 10px;
    text-decoration:none;
    color:var(--text);
    transition:background .18s, color .18s, padding-left .18s;
  }
  a:hover, a:focus-visible{
    background:rgba(216,180,90,.06);
    color:var(--gold);
    padding-left:20px;
    outline:none;
  }
  .num{
    font-size:11px;
    letter-spacing:.2em;
    color:var(--gold-dim);
    min-width:2.2em;
  }
  .name{
    font-size:17px;
    letter-spacing:.04em;
  }
  .file{
    margin-left:auto;
    font-size:11px;
    letter-spacing:.08em;
    color:var(--muted);
  }
  a:hover .file{ color:var(--gold-dim) }

  footer{
    margin-top:30px;
    font-size:11px;
    letter-spacing:.14em;
    color:var(--muted);
    text-align:right;
  }
</style>
</head>
<body>
<canvas id="space" aria-hidden="true"></canvas>
<main>
  <header>
    <h1>SKETCHES</h1>
    <p>Small worlds, works in progress.</p>
  </header>
  <ul>

      <span class="num">V</span><span class="name">Harbor</span><span class="file">harbor.html</span>
    </a></li>
  </ul>
  <footer>✦</footer>
</main>

<script>
/* Flying through space — perspective starfield with gentle motion trails */
(function(){
  const canvas = document.getElementById('space');
  const ctx = canvas.getContext('2d');
  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;

  let W, H, CX, CY;
  function resize(){
    const dpr = Math.min(devicePixelRatio || 1, 2);
    W = innerWidth; H = innerHeight;
    canvas.width = W*dpr; canvas.height = H*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
    CX = W/2; CY = H/2;
  }
  resize();
  addEventListener('resize', resize);

  const N = 320;
  const SPEED = 0.16;                 // gentle cruise, not a hyperjump
  const tints = ['#dfe6f2','#bfc8dd','#9aa4b8','#d8c9a0'];  // a few gold-warm stars
  const stars = [];
  function spawn(s, anywhere){
    s.x = (Math.random()*2-1);        // -1..1 view space
    s.y = (Math.random()*2-1);
    s.z = anywhere ? Math.random()*0.95+0.05 : 1;
    s.tint = tints[(Math.random()*tints.length)|0];
    return s;
  }
  for(let i=0;i<N;i++) stars.push(spawn({}, true));

  function project(s){
    const k = 0.9/s.z;                // perspective divide
    return [CX + s.x*k*CX, CY + s.y*k*CY, k];
  }

  function drawStatic(){
    ctx.clearRect(0,0,W,H);
    for(const s of stars){
      const [sx,sy] = project(s);
      if(sx<0||sx>W||sy<0||sy>H) continue;
      ctx.fillStyle = s.tint;
      ctx.globalAlpha = Math.min(1, 0.25 + (1-s.z)*0.75);
      ctx.beginPath();
      ctx.arc(sx, sy, Math.min(2.2, 0.4 + (1-s.z)*1.6), 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  if(reduced){ drawStatic(); return; }   // respect reduced motion: calm, still sky

  let last = performance.now();
  function frame(now){
    requestAnimationFrame(frame);
    const dt = Math.min(0.05,(now-last)/1000); last = now;

    // fade previous frame slightly instead of clearing → soft streak trails
    ctx.fillStyle = 'rgba(5,6,8,0.38)';
    ctx.fillRect(0,0,W,H);

    for(const s of stars){
      const [px,py] = project(s);
      s.z -= SPEED*dt;
      if(s.z <= 0.03){ spawn(s,false); continue; }
      const [sx,sy] = project(s);
      if(sx<-20||sx>W+20||sy<-20||sy>H+20){ spawn(s,false); continue; }

      const near = 1 - s.z;
      ctx.strokeStyle = s.tint;
      ctx.globalAlpha = Math.min(1, 0.2 + near*0.8);
      ctx.lineWidth = Math.min(2.4, 0.5 + near*1.8);
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(px, py);              // streak from last position → this one
      ctx.lineTo(sx, sy);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
