<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kayangan — Visual Bench</title>
<style>
  :root {
    --gold: #c9a15a;
    --gold-dim: #8a6d3b;
    --ink: #e8e2d5;
    --panel: rgba(8, 9, 16, 0.78);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #04050a; }
  body { font-family: Georgia, 'Times New Roman', serif; color: var(--ink); }
  canvas { display: block; }

  /* ---- Backend badge + perf HUD (top right) ---- */
  #hud {
    position: fixed; top: 14px; right: 16px; text-align: right;
    pointer-events: none; user-select: none;
  }
  #backend {
    display: inline-block; letter-spacing: 0.22em; font-size: 11px;
    padding: 4px 10px; border: 1px solid var(--gold-dim);
    color: var(--gold); background: var(--panel);
  }
  #backend.webgl { color: #7aa7d9; border-color: #3d5a7a; }
  #perf {
    margin-top: 6px; font-size: 11px; letter-spacing: 0.12em;
    color: rgba(232, 226, 213, 0.55);
  }

  /* ---- Control panel (top left) ---- */
  #panel {
    position: fixed; top: 14px; left: 16px; width: 232px;
    background: var(--panel); border: 1px solid rgba(201, 161, 90, 0.35);
    padding: 14px 16px 12px;
    max-height: calc(100vh - 40px); overflow-y: auto;
  }
  #panel h1 {
    font-size: 15px; font-weight: normal; letter-spacing: 0.30em;
    color: var(--gold); text-transform: uppercase;
  }
  #panel-toggle {
    position: absolute; top: 12px; right: 12px;
    width: 22px; height: 22px; line-height: 1; padding: 0;
    background: none; border: 1px solid rgba(201, 161, 90, 0.35);
    color: var(--gold); font-family: inherit; font-size: 13px;
    cursor: pointer;
  }
  #panel-toggle:hover { border-color: var(--gold); }
  #panel.collapsed { width: auto; padding: 10px 46px 10px 16px; }
  #panel.collapsed .sub, #panel.collapsed .row,
  #panel.collapsed .check, #panel.collapsed .hint { display: none; }
  #panel .sub {
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(232, 226, 213, 0.45); margin: 3px 0 12px;
  }
  .row { margin-bottom: 10px; }
  .row.dim { opacity: 0.35; pointer-events: none; }
  .row label {
    display: flex; justify-content: space-between;
    font-size: 11px; letter-spacing: 0.10em; text-transform: uppercase;
    color: rgba(232, 226, 213, 0.7); margin-bottom: 4px;
  }
  .row label span { color: var(--gold); }
  input[type="range"] {
    -webkit-appearance: none; width: 100%; height: 2px;
    background: rgba(201, 161, 90, 0.35); outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 11px; height: 11px; border-radius: 50%;
    background: var(--gold); cursor: pointer;
  }
  input[type="range"]::-moz-range-thumb {
    width: 11px; height: 11px; border-radius: 50%; border: none;
    background: var(--gold); cursor: pointer;
  }
  select {
    width: 100%; background: rgba(8, 9, 16, 0.9); color: var(--gold);
    border: 1px solid rgba(201, 161, 90, 0.35); padding: 4px 6px;
    font-family: inherit; font-size: 11px; letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .check {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; letter-spacing: 0.10em; text-transform: uppercase;
    color: rgba(232, 226, 213, 0.7); cursor: pointer; margin-bottom: 10px;
  }
  .check input { accent-color: #c9a15a; }
  #panel .hint {
    font-size: 10px; color: rgba(232, 226, 213, 0.35);
    border-top: 1px solid rgba(201, 161, 90, 0.2);
    padding-top: 8px; margin-top: 4px; line-height: 1.5;
  }
  #panel .hint code { font-family: monospace; color: rgba(201,161,90,0.6); }

  #boot-error {
    position: fixed; inset: 0; display: none; place-items: center;
    background: #04050a; text-align: center; padding: 24px;
  }
  #boot-error p { max-width: 480px; line-height: 1.6; color: rgba(232,226,213,0.8); }
</style>

<!-- Pin one known version; bump deliberately, re-test both backends when you do. -->

{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.webgpu.js",
    "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.webgpu.js",
    "three/tsl": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.tsl.js",

}

<body>

<div id="panel">
  <h1>Kayangan</h1>
  <button id="panel-toggle" title="Minimize panel">–</button>
  <div class="sub">Visual Bench · Step 0–5</div>
  <div class="row">
    <label>Quality <span id="v-q"></span></label>
    <select id="s-q">
      <option value="high">High — desktop</option>
      <option value="medium">Medium</option>
      <option value="low">Low — mobile / Quest</option>
    </select>
  </div>
  <label class="check"><input id="c-cycle" type="checkbox"> Time flows</label>
  <div class="row" id="r-az">
    <label>Sun azimuth <span id="v-az">40°</span></label>
    <input id="s-az" type="range" min="0" max="360" step="1" value="40">
  </div>
  <div class="row" id="r-el">
    <label>Sun elevation <span id="v-el">28°</span></label>
    <input id="s-el" type="range" min="-30" max="90" step="1" value="28">
  </div>
  <div class="row">
    <label>Sea level <span id="v-sea">0.00</span></label>
    <input id="s-sea" type="range" min="-0.22" max="0.22" step="0.005" value="0">
  </div>
  <div class="sub" style="margin:10px 0 8px">Step 4 · Water</div>
  <label class="check"><input id="c-depthfx" type="checkbox" checked> Depth FX (foam + absorption)</label>
  <label class="check"><input id="c-refr" type="checkbox"> Refraction</label>
  <div class="row">
    <label>Absorption <span id="v-abs">2.8</span></label>
    <input id="s-abs" type="range" min="0.5" max="8" step="0.1" value="2.8">
  </div>
  <div class="row">
    <label>Foam width <span id="v-foam">0.040</span></label>
    <input id="s-foam" type="range" min="0.005" max="0.12" step="0.005" value="0.04">
  </div>
  <div class="row">
    <label>Wave amp <span id="v-wamp">0.42</span></label>
    <input id="s-wamp" type="range" min="0" max="1" step="0.02" value="0.42">
  </div>
  <div class="row">
    <label>Wave scale <span id="v-wsc">9.0</span></label>
    <input id="s-wsc" type="range" min="3" max="20" step="0.5" value="9">
  </div>
  <div class="row">
    <label>Refr. strength <span id="v-refr">0.045</span></label>
    <input id="s-refr" type="range" min="0" max="0.1" step="0.005" value="0.045">
  </div>
  <div class="sub" style="margin:10px 0 8px">Step 5 · Waterfalls</div>
  <label class="check"><input id="c-waterfall" type="checkbox" checked> Rim waterfalls</label>
  <div class="row">
    <label>Moisture <span id="v-wet">0.00</span></label>
    <input id="s-wet" type="range" min="0" max="1" step="0.01" value="0">
  </div>
  <div class="row">
    <label>Exposure <span id="v-ex">1.00</span></label>
    <input id="s-ex" type="range" min="0.2" max="2.5" step="0.05" value="1.0">
  </div>
  <div class="sub" style="margin:10px 0 8px">Step 6 · Post + Atmosphere</div>
  <label class="check"><input id="c-quest" type="checkbox"> Quest preset (lean post)</label>
  <label class="check"><input id="c-music" type="checkbox"> Music (tintinnabuli)</label>
  <label class="check"><input id="c-fxaa" type="checkbox"> FXAA</label>
  <div class="row" id="r-bloom">
    <label>Bloom strength <span id="v-bloom">0.70</span></label>
    <input id="s-bloom" type="range" min="0" max="2" step="0.05" value="0.7">
  </div>
  <div class="row" id="r-thr">
    <label>Bloom threshold <span id="v-thr">1.30</span></label>
    <input id="s-thr" type="range" min="0" max="4" step="0.05" value="1.3">
  </div>
  <div class="row" id="r-punch">
    <label>Punch (grade) <span id="v-punch">0.75</span></label>
    <input id="s-punch" type="range" min="0" max="1.5" step="0.05" value="0.75">
  </div>
  <div class="row" id="r-rim">
    <label>Rim glow <span id="v-rim">0.50</span></label>
    <input id="s-rim" type="range" min="0" max="2" step="0.05" value="0.5">
  </div>
  <div class="row" id="r-fog">
    <label>Under-disc fog <span id="v-fog">0.50</span></label>
    <input id="s-fog" type="range" min="0" max="2" step="0.05" value="0.5">
  </div>
  <div class="hint">
    Drag to orbit · wheel to zoom.<br>
    <code>?forcewebgl</code> WebGL2 path · <code>?q=low|medium|high</code>
    force tier · <code>?seed=N</code> new continents.
  </div>
</div>

<div id="hud">
  <span id="backend">BOOTING…</span>
  <div id="perf">— fps · — ms</div>
</div>

<div id="boot-error"><p id="boot-error-msg"></p></div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import {
  Fn, float, vec2, vec3, vec4, uniform,
  positionLocal, normalLocal, normalize, dot, pow, max, min, clamp, step, exp, abs,
  mix, smoothstep, fract, sin, floor, length,
  mx_noise_float, pmremTexture, cubeTexture,
  // Step 4 — water
  time, transformNormalToView, screenUV, linearDepth,
  viewportLinearDepth, viewportDepthTexture, viewportSharedTexture,
  cameraNear, cameraFar,
  // Step 4.2 — linear scene pass for refraction (fixes double tone-map)
  pass,
  // Step 5 — rim waterfalls (WebGPU compute particles + billboarded streaks)
  instancedArray, instanceIndex, uniformArray, billboarding,
  hash, uint, deltaTime, cos, PI, If, attribute, uv,
  // Step 6 — post + atmosphere
  renderOutput, positionViewDirection, normalView
} from 'three/tsl';
// Step 6 post nodes (ship in three r180 examples; resolve via the addons importmap).
// bloom = selective-by-threshold glow; fxaa = display-space AA (MSAA does NOT carry
// through the scene pass(), and Step 6 makes that pass always-on — see §16 in the log).
import { bloom } from 'three/addons/tsl/display/BloomNode.js';
import { fxaa }  from 'three/addons/tsl/display/FXAANode.js';

/* ============================================================
   QUALITY TIERS — every shader must survive the low tier.
   ============================================================ */
const TIERS = {
  high:   { octaves: 5, cube: 1024, pixelRatio: 2.0, bakeMs: 250, antialias: true,  detail: true  },
  medium: { octaves: 4, cube: 512,  pixelRatio: 1.5, bakeMs: 450, antialias: true,  detail: true  },
  low:    { octaves: 3, cube: 256,  pixelRatio: 1.0, bakeMs: 900, antialias: false, detail: false },
};
const search = new URLSearchParams(location.search);
const qParam = search.get('q');
const autoTier = /Quest|Android|Mobile/i.test(navigator.userAgent) ? 'low' : 'high';
const tierName = TIERS[qParam] ? qParam : autoTier;
const TIER = TIERS[tierName];
const SEED = parseFloat(search.get('seed')) || 7;

/* ============================================================
   STEP 0 — HARNESS
   ============================================================ */
const forceWebGL = search.has('forcewebgl');

let renderer;
try {
  renderer = new THREE.WebGPURenderer({ antialias: TIER.antialias, forceWebGL });
  await renderer.init();
} catch (err) {
  bootFail('Renderer failed to initialise. ' + err.message +
    ' — try a current Chrome/Edge, or append ?forcewebgl to test the fallback path.');
  throw err;
}

renderer.setPixelRatio(Math.min(window.devicePixelRatio, TIER.pixelRatio));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.AgXToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const isWebGPU = !!(renderer.backend && renderer.backend.isWebGPUBackend);
const badge = document.getElementById('backend');
badge.textContent = (isWebGPU ? 'WEBGPU' : 'WEBGL2') + ' · ' + tierName.toUpperCase();
badge.classList.toggle('webgl', !isWebGPU);

const log = (...a) => { try { (console.log || (() => {}))('[Kayangan bench]', ...a); } catch (_) {} };
log('backend:', badge.textContent, '· seed:', SEED);

function bootFail(msg) {
  document.getElementById('boot-error').style.display = 'grid';
  document.getElementById('boot-error-msg').textContent = msg;
}

/* ============================================================
   STEP 1 — NEBULA SKY (baked-static architecture)
   Rule learned on real devices: procedural sky NEVER runs
   per-pixel per-frame. Bake shader -> cube; display = 1 fetch.
   Future SkyEnv module.
   ============================================================ */
const uSunDir = uniform(new THREE.Vector3(0, 0.5, -1).normalize());

const hash3 = Fn(([p]) =>
  fract(sin(dot(p, vec3(127.1, 311.7, 74.7))).mul(43758.5453123))
);

function fbmNode(p, octaves) {
  let value = float(0);
  let amp = 0.5;
  let q = p;
  for (let i = 0; i < octaves; i++) {
    value = value.add(mx_noise_float(q).mul(amp));
    q = q.mul(2.03);
    amp *= 0.5;
  }
  return value; // roughly [-1, 1]
}

const starLayer = Fn(([dir]) => {
  const cell = dir.mul(140.0);
  const id = floor(cell);
  const presence = smoothstep(float(0.988), float(1.0), hash3(id));
  const d = length(fract(cell).sub(0.5));
  const glow = pow(smoothstep(float(0.34), float(0.0), d), float(2.0));
  const tint = mix(vec3(0.70, 0.80, 1.00), vec3(1.00, 0.88, 0.66), hash3(id.add(vec3(7.3, 1.1, 3.9))));
  return tint.mul(presence).mul(glow).mul(2.2);
});

const skyBakeNode = Fn(() => {
  const dir = normalize(positionLocal);
  const col = vec3(0.008, 0.010, 0.022).toVar();

  const bandN = normalize(vec3(0.35, 1.0, 0.18));
  const band = exp(abs(dot(dir, bandN)).mul(-4.0));

  const nGold = fbmNode(dir.mul(3.0).add(vec3(13.7, 0.0, 4.1)), TIER.octaves).mul(0.5).add(0.5);
  const nBlue = fbmNode(dir.mul(5.0).add(vec3(0.0, 27.3, 9.1)), TIER.octaves).mul(0.5).add(0.5);
  const nMag  = fbmNode(dir.mul(4.0).add(vec3(51.0, 3.3, 17.7)), Math.max(TIER.octaves - 1, 2)).mul(0.5).add(0.5);

  col.addAssign(vec3(0.95, 0.62, 0.25).mul(pow(nGold, float(3.2))).mul(band).mul(0.85));
  col.addAssign(vec3(0.12, 0.20, 0.50).mul(pow(nBlue, float(2.6))).mul(band.mul(0.6).add(0.15)));
  col.addAssign(vec3(0.45, 0.15, 0.40).mul(pow(nMag,  float(4.0))).mul(band).mul(0.35));

  const dust = pow(fbmNode(dir.mul(7.0).add(vec3(80.0, 80.0, 80.0)), TIER.octaves).mul(0.5).add(0.5), float(3.0)).mul(band);
  col.mulAssign(float(1.0).sub(dust.mul(0.65)));

  // Soft sun glow baked in so the env map lights with it;
  // the crisp disc is drawn live in the display shader.
  const sd = dot(dir, uSunDir);
  const corona = pow(max(sd, 0.0), float(64.0)).mul(0.9)
           .add(pow(max(sd, 0.0), float(8.0)).mul(0.08));
  col.addAssign(vec3(1.0, 0.85, 0.6).mul(corona));

  return vec4(col, 1.0);
});

const skyBakeMat = new THREE.MeshBasicNodeMaterial({ side: THREE.BackSide, depthWrite: false });
skyBakeMat.colorNode = skyBakeNode();

const cubeRT = new THREE.WebGLCubeRenderTarget(TIER.cube, { type: THREE.HalfFloatType });
const cubeCam = new THREE.CubeCamera(0.1, 2000, cubeRT);

const skyGeo = new THREE.SphereGeometry(900, 64, 32);
const skyScene = new THREE.Scene();
skyScene.add(new THREE.Mesh(skyGeo, skyBakeMat));
skyScene.add(cubeCam);

const skyDisplayNode = Fn(() => {
  const dir = normalize(positionLocal);
  const col = cubeTexture(cubeRT.texture, dir).rgb.toVar();
  col.addAssign(starLayer(dir));
  const sd = dot(dir, uSunDir);
  const disc = smoothstep(float(0.99955), float(0.99985), sd).mul(30.0);
  col.addAssign(vec3(1.0, 0.85, 0.6).mul(disc));
  return vec4(col, 1.0);
});

const skyDisplayMat = new THREE.MeshBasicNodeMaterial({ side: THREE.BackSide, depthWrite: false });
skyDisplayMat.colorNode = skyDisplayNode();

const scene = new THREE.Scene();
scene.add(new THREE.Mesh(skyGeo, skyDisplayMat));

let envApplied = false;
function bakeEnvironment() {
  // CRITICAL: bake in linear. AgX must be applied exactly once, at the
  // final canvas pass — baking with tone mapping on then displaying
  // through tone mapping again double-applies it and fogs the sky.
  const tm = renderer.toneMapping;
  renderer.toneMapping = THREE.NoToneMapping;
  cubeCam.update(renderer, skyScene);
  renderer.toneMapping = tm;
  if (!envApplied) {
    try {
      scene.environmentNode = pmremTexture(cubeRT.texture);
    } catch (err) {
      log('pmremTexture failed — raw cube env fallback.', err);
      scene.environment = cubeRT.texture;
    }
    envApplied = true;
  }
}

/* ============================================================
   STEP 3a — WORLD GEOMETRY (CPU, seeded)
   Port of the sketch's polar-grid disc: 84 rings x 220 segs
   top surface, jagged rock skirt, bottom point. Heights baked
   into positions; biomes now live in the SHADER, not vertex
   colors. Future WorldGeometry module.
   ============================================================ */
const RINGS = 84, SEGS = 220, RADIUS = 2.4;
const SKIRT_ROWS = 5, SKIRT_BOTTOM = -1.25, TIP_Y = -1.55;

function makeSeededNoise(seed) {
  const h = (x, y) => {
    const s = Math.sin(x * 127.1 + y * 311.7 + seed * 74.7) * 43758.5453123;
    return s - Math.floor(s);
  };
  const sm = t => t * t * (3 - 2 * t);
  const vn = (x, y) => {
    const xi = Math.floor(x), yi = Math.floor(y);
    const xf = x - xi, yf = y - yi;
    const a = h(xi, yi), b = h(xi + 1, yi), c = h(xi, yi + 1), d = h(xi + 1, yi + 1);
    const u = sm(xf), v = sm(yf);
    return a + (b - a) * u + (c - a) * v + (a - b - c + d) * u * v;
  };
  const fbm = (x, y, oct) => {
    let v = 0, amp = 0.5, f = 1;
    for (let i = 0; i < oct; i++) { v += amp * vn(x * f, y * f); f *= 2.03; amp *= 0.5; }
    return v; // ~0..0.97, mean ~0.48
  };
  return { fbm, vn };
}

function buildWorldGeometry(seed) {
  const noise = makeSeededNoise(seed);

  const heightAt = (x, z) => {
    // ~3-4 continent features per diameter (0.55 was one giant slope)
    let hgt = (noise.fbm(x * 1.25 + 9.2, z * 1.25 + 3.1, 5) - 0.48) * 1.35;
    hgt += (noise.fbm(x * 3.4 + 40.0, z * 3.4 + 40.0, 4) - 0.48) * 0.4; // detail
    return hgt * 0.62; // roughly -0.45 .. +0.45, sea at 0
  };

  const positions = [];
  const indices = [];
  const rimY = new Float32Array(SEGS); // Step 5: rim height per segment (waterfalls spill where rimY < sea)

  // --- Top surface: polar grid, wrap-indexed (no seam duplicates) ---
  for (let r = 0; r <= RINGS; r++) {
    const rad = (r / RINGS) * RADIUS;
    for (let s = 0; s < SEGS; s++) {
      const a = (s / SEGS) * Math.PI * 2;
      const x = Math.cos(a) * rad, z = Math.sin(a) * rad;
      const y = heightAt(x, z);
      positions.push(x, y, z);
      if (r === RINGS) rimY[s] = y;
    }
  }
  const topIdx = (r, s) => r * SEGS + (s % SEGS);
  for (let r = 0; r < RINGS; r++) {
    for (let s = 0; s < SEGS; s++) {
      const a = topIdx(r, s), b = topIdx(r + 1, s), c = topIdx(r + 1, s + 1), d = topIdx(r, s + 1);
      indices.push(a, b, c, a, c, d);
    }
  }

  // --- Rock skirt: descending noise-jagged rings from the rim ---
  const skirtStart = positions.length / 3;
  const profile = [1.03, 1.045, 0.99, 0.86, 0.56]; // radius multipliers per row
  for (let t = 0; t < SKIRT_ROWS; t++) {
    const f = (t + 1) / SKIRT_ROWS;
    for (let s = 0; s < SEGS; s++) {
      const a = (s / SEGS) * Math.PI * 2;
      const rimH = positions[topIdx(RINGS, s) * 3 + 1];
      const jag = (noise.vn(s * 0.35, t * 2.7) - 0.5) * 0.16 * (0.4 + f);
      const rad = RADIUS * profile[t] + jag;
      const y = rimH + (SKIRT_BOTTOM - rimH) * f + (noise.vn(s * 0.9, t * 5.1) - 0.5) * 0.1;
      positions.push(Math.cos(a) * rad, y, Math.sin(a) * rad);
    }
  }
  const skirtIdx = (t, s) => skirtStart + t * SEGS + (s % SEGS);
  for (let s = 0; s < SEGS; s++) { // rim -> first skirt row
    const a = topIdx(RINGS, s), b = skirtIdx(0, s), c = skirtIdx(0, s + 1), d = topIdx(RINGS, s + 1);
    indices.push(a, b, c, a, c, d);
  }
  for (let t = 0; t < SKIRT_ROWS - 1; t++) {
    for (let s = 0; s < SEGS; s++) {
      const a = skirtIdx(t, s), b = skirtIdx(t + 1, s), c = skirtIdx(t + 1, s + 1), d = skirtIdx(t, s + 1);
      indices.push(a, b, c, a, c, d);
    }
  }
  // --- Bottom point fan ---
  const tip = positions.length / 3;
  positions.push(0, TIP_Y, 0);
  for (let s = 0; s < SEGS; s++) {
    indices.push(skirtIdx(SKIRT_ROWS - 1, s), tip, skirtIdx(SKIRT_ROWS - 1, s + 1));
  }

  // Winding fix: as generated, radial-cross-tangential faces DOWN
  // (normals inverted, top surface culled from above). Reverse every
  // triangle so all faces point outward.
  for (let i = 0; i < indices.length; i += 3) {
    const t = indices[i + 1];
    indices[i + 1] = indices[i + 2];
    indices[i + 2] = t;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setIndex(indices);
  geo.computeVertexNormals();
  geo.userData.rimY = rimY;
  return geo;
}

/* ============================================================
   STEP 3b — TERRAIN MATERIAL (TSL)
   Height-band biomes + slope rock + moisture stub, computed
   per-pixel from local position/normal (rotation-proof for the
   future XR grab). All-procedural, so 3D noise is inherently
   seamless — true triplanar arrives only when texture maps do.
   Future TerrainMaterial module.
   ============================================================ */
const uSeaLevel = uniform(0.0);
const uMoisture = uniform(0.0);

const BIOME = {
  abyss:  vec3(0.030, 0.075, 0.105),
  sand:   vec3(0.640, 0.575, 0.410),  // muted, less brilliant than before
  grass:  vec3(0.205, 0.355, 0.150),  // darker, greener (was a yellow-green)
  forest: vec3(0.110, 0.255, 0.135),  // deep green
  rock:   vec3(0.420, 0.400, 0.370),
  cliff:  vec3(0.300, 0.280, 0.260),
  snow:   vec3(0.900, 0.925, 0.950),
};

const terrainColorNode = Fn(() => {
  const h = positionLocal.y;
  const slope = float(1.0).sub(max(normalLocal.y, 0.0));

  // Band-edge breakup so biome borders wander naturally
  const breakup = mx_noise_float(positionLocal.mul(6.0)).mul(0.5).add(0.5);
  const hh = h.sub(uSeaLevel).add(breakup.sub(0.5).mul(0.07)).toVar();

  const col = mix(BIOME.abyss, BIOME.sand, smoothstep(float(-0.16), float(-0.02), hh)).toVar();
  col.assign(mix(col, BIOME.grass,  smoothstep(float(-0.005), float(0.020), hh))); // grass from the waterline -> thin beach
  col.assign(mix(col, BIOME.forest, smoothstep(float(0.05),  float(0.14), hh).mul(breakup.mul(0.6).add(0.4))));
  col.assign(mix(col, BIOME.rock,   smoothstep(float(0.23),  float(0.31), hh)));
  col.assign(mix(col, BIOME.snow,   smoothstep(float(0.31),  float(0.38), hh)));

  // Steep faces read as cliff rock regardless of band (also covers the skirt)
  col.assign(mix(col, BIOME.cliff, smoothstep(float(0.35), float(0.65), slope)));

  // Fine tonal grain (skipped on the low tier)
  if (TIER.detail) {
    const grain = mx_noise_float(positionLocal.mul(24.0)).mul(0.5).add(0.5);
    col.mulAssign(grain.mul(0.18).add(0.91));
  }

  // Moisture stub — Phase 2 replaces this global with a per-texel map.
  // Darkens the vegetated/sand bands toward lush wet tones.
  const vegMask = smoothstep(float(-0.04), float(0.02), hh).mul(smoothstep(float(0.24), float(0.12), hh));
  col.assign(mix(col, col.mul(vec3(0.52, 0.62, 0.50)), uMoisture.mul(vegMask)));

  // Depth darkening below the world floor (skirt undershadow)
  col.mulAssign(smoothstep(float(-1.7), float(-0.15), h).mul(0.78).add(0.22));

  return col;
});

const terrainRoughnessNode = Fn(() => {
  const h = positionLocal.y;
  const breakup = mx_noise_float(positionLocal.mul(6.0)).mul(0.5).add(0.5);
  const hh = h.sub(uSeaLevel).add(breakup.sub(0.5).mul(0.07));
  const snowMask = smoothstep(float(0.30), float(0.38), hh);
  const sandMask = smoothstep(float(-0.16), float(-0.02), hh).mul(smoothstep(float(0.020), float(-0.005), hh));
  const r = float(0.93).toVar();
  r.assign(mix(r, float(0.55), snowMask)); // snow slightly glossy under the nebula
  r.assign(mix(r, float(0.78), sandMask));
  return r;
});

const terrainMat = new THREE.MeshStandardNodeMaterial({ metalness: 0.0 });
terrainMat.colorNode = terrainColorNode();
terrainMat.roughnessNode = terrainRoughnessNode();

// ---- Step 6: fresnel rim glow on the disc edge (atmospheric limb) ----
// View-space fresnel: bright where the surface turns away from the eye (the
// silhouette / disc rim + skirt edges). Written as EMISSIVE so it glows
// independent of sun lighting and gets picked up by bloom for a soft halo.
// View-dependent on purpose — the rim should track the camera, not the disc,
// so this correctly uses view-space (unlike the rotation-proof LOCAL colorNode).
const uRimStrength = uniform(0.5);
const RIM_COL = new THREE.Color(0.42, 0.66, 1.0); // cool atmosphere blue
const rimFacing = clamp(dot(normalView, positionViewDirection), float(0.0), float(1.0));
const rimTerm   = pow(float(1.0).sub(rimFacing), float(3.2)).mul(uRimStrength);
terrainMat.emissiveNode = vec3(RIM_COL.r, RIM_COL.g, RIM_COL.b).mul(rimTerm);

const world = new THREE.Mesh(buildWorldGeometry(SEED), terrainMat);
scene.add(world);

/* ============================================================
   STEP 4 — WATER (the headline shot)
   Backdrop pattern from the official webgpu_backdrop_water
   example: viewportLinearDepth drives shoreline foam +
   depth absorption; viewportSharedTexture drives refraction.
   Both are backend-agnostic TSL nodes, but each costs a
   framebuffer copy per frame on WebGL2 — so they are
   independently severable via the "Depth FX" (depth copy)
   and "Refraction" (color copy) checkboxes: a three-way A/B
   for the device tests. The env bakes from its own skyScene,
   so the water never pollutes its own reflections.
   Future WaterMaterial module.
   ============================================================ */
const uAbsorb    = uniform(2.8);    // absorption strength, 1/world-unit
const uFoamWidth = uniform(0.04);   // water depth that reads as shoreline
const uWaveAmp   = uniform(0.42);   // normal perturbation strength
const uWaveScale = uniform(9.0);    // ripple spatial frequency
const uRefr      = uniform(0.045);  // refraction UV distortion

const waterOpts = {
  depthFX:    true,
  refraction: tierName !== 'low',        // color copy off on mobile/Quest by default
  octaves:    tierName === 'high' ? 3 : (tierName === 'medium' ? 2 : 1),
  bands:      tierName !== 'low',        // retreating foam lines
  whitecaps:  tierName === 'high',
};

function buildWaterMaterial() {
  const mat = new THREE.MeshStandardNodeMaterial();
  mat.transparent = true;
  mat.metalnessNode = float(0.0);

  // ---- wave height field (procedural, no textures) ----
  const waveH = Fn(([p]) => {
    const t = time.mul(0.11);
    const q = vec3(p.x, t, p.y);
    const n = mx_noise_float(q).mul(0.62).toVar();
    n.addAssign(mx_noise_float(q.mul(2.63).add(vec3(19.7, 3.1, 7.7))).mul(0.28));
    if (waterOpts.octaves >= 3) {
      n.addAssign(mx_noise_float(q.mul(6.1).add(vec3(4.2, 41.0, 13.9))).mul(0.13));
    }
    return n;
  });

  const p  = positionLocal.xz.mul(uWaveScale);
  const e  = float(0.07);
  const h  = waveH(p);
  const slopeX = h.sub(waveH(p.add(vec2(e, 0)))).mul(uWaveAmp);
  const slopeZ = h.sub(waveH(p.add(vec2(0, e)))).mul(uWaveAmp);
  mat.normalNode = transformNormalToView(normalize(vec3(slopeX, 1.0, slopeZ)));

  // ---- shared color anchors ----
  const deepCol  = vec3(0.014, 0.095, 0.155); // ink-blue scatter floor
  const foamCol  = vec3(0.93, 0.96, 0.97);
  const surfTint = vec3(0.018, 0.045, 0.060); // near-black albedo -> env reflection dominates
  const kRGB     = vec3(3.2, 1.15, 0.85);     // per-channel absorption (red dies first)

  if (waterOpts.depthFX) {
    // ---- water depth in ~world units ----
    const fragD  = linearDepth();                     // this fragment, 0..1 near->far
    const range  = cameraFar.sub(cameraNear);
    const depthW = viewportLinearDepth.sub(fragD).mul(range).max(0.0);

    // ---- foam ----
    const shore  = depthW.div(uFoamWidth).clamp();    // 0 at shoreline -> 1 deep
    const foamN  = mx_noise_float(
      vec3(positionLocal.x.mul(16.0), time.mul(0.45), positionLocal.z.mul(16.0))
    ).mul(0.5).add(0.5);
    // NOTE: no .toVar()/.assign() at material top-level — those need an
    // Fn() stack (Rule #4). Plain JS reassignment builds the same graph.
    let foam = shore.oneMinus().mul(1.35).sub(foamN.mul(0.55)).clamp();
    if (waterOpts.bands) {
      // retreating foam lines marching toward shore
      const band = shore.mul(6.0).sub(time.mul(0.7)).sin().mul(0.5).add(0.5);
      foam = foam.add(smoothstep(float(0.86), float(0.98), band).mul(shore.oneMinus()).mul(0.6)).clamp();
    }
    if (waterOpts.whitecaps) {
      foam = foam.add(smoothstep(float(0.55), float(0.85), h).mul(0.30)).clamp();
    }

    mat.colorNode     = mix(surfTint, foamCol, foam);
    mat.roughnessNode = mix(float(0.09), float(0.85), foam);

    if (waterOpts.refraction) {
      // ---- refracted see-through body (backdrop pattern) ----
      const refrUV   = screenUV.add(vec2(slopeX, slopeZ).mul(uRefr));
      const dRefr    = linearDepth(viewportDepthTexture(refrUV));
      const usable   = dRefr.sub(fragD).greaterThan(0.0); // refracted sample is behind water
      const finalUV  = usable.select(refrUV, screenUV);
      const sceneLin = usable.select(dRefr, viewportLinearDepth);
      const dSeen    = sceneLin.sub(fragD).mul(range).max(0.0);

      const sceneCol = viewportSharedTexture(finalUV).rgb;
      const body = sceneCol
        .mul(exp(kRGB.mul(dSeen).mul(uAbsorb).negate()))                          // absorption
        .add(deepCol.mul(exp(dSeen.mul(uAbsorb).mul(0.9).negate()).oneMinus()));  // scatter-in

      mat.backdropNode      = body;
      mat.backdropAlphaNode = foam.oneMinus(); // foam is opaque over the see-through
    } else {
      // ---- depth FX without the color copy (low-tier default) ----
      const dFac = exp(depthW.mul(uAbsorb).mul(0.9).negate()).oneMinus();
      const body = mix(vec3(0.10, 0.34, 0.38), deepCol, dFac); // shallow lagoon -> ink
      mat.colorNode   = mix(body, foamCol, foam);
      mat.opacityNode = mix(mix(float(0.30), float(0.95), dFac), float(1.0), foam);
    }
  } else {
    // ---- kill-switch fallback: = the Step-3c placeholder look ----
    mat.colorNode     = surfTint;
    mat.roughnessNode = float(0.11);
    mat.opacityNode   = float(0.88);
  }

  return mat;
}

const waterGeo = new THREE.CircleGeometry(RADIUS * 0.998, 160);
waterGeo.rotateX(-Math.PI / 2); // baked in: positionLocal stays true XZ (rotation-proof)
const sea = new THREE.Mesh(waterGeo, buildWaterMaterial());
sea.renderOrder = 10; // after opaque terrain within the transparent pass
scene.add(sea);

function rebuildWater() {
  const old = sea.material;
  sea.material = buildWaterMaterial();
  old.dispose();
}

/* ============================================================
   STEP 5 — RIM WATERFALLS (the disc-world identity)
   Ocean spills off the rim wherever the rim height sits BELOW
   sea level. Two backends behind one update() interface:

   • WebGPU  — TSL COMPUTE particles (instancedArray position/
     velocity/life updated in a compute pass; billboarded
     additive streaks). This is the strategic validation for
     Phase 2's GPU erosion/shallow-water sim.
   • WebGL2  — CPU-stepped instanced billboarded quads (same
     PlaneGeometry + billboarding + additive material as the
     GPU path, via one buildStreakMaterial()). TSL compute has
     no WebGL2 path, so JS integrates the particles and writes
     per-instance position/alpha/brightness into InstancedBuffer-
     Attributes. (Was THREE.Points, but the node point-sprite/
     size path is unreliable on the WebGL2 backend -> nothing
     drew; instanced quads render identically on both backends.)

   Emission is gated LIVE by the sea slider: rim height per
   segment (rimY) is static; `active = rimY < uSeaLevel` is a
   scalar compare, so moving the sea grows/shrinks the falls
   with zero rebuild. Rule #4 respected — every compute assign
   lives inside an Fn() scope.
   Future WaterfallSystem module (must reparent into the disc
   group for the Phase-1 XR grab; here the disc is world-fixed).
   ============================================================ */
const rimY = world.geometry.userData.rimY;

const WF_COUNT = { high: 7000, medium: 4200, low: 2200 }[tierName];
const WF_R     = 2.50;             // spawn radius, just outside the rim lip (rim = RADIUS 2.4)
const WF_SEGW  = (Math.PI * 2) / SEGS; // angular width of one rim segment
// --- shape knobs (tune these for "joy"; see notes in the handoff log) ---
const WF_SPREAD= 3.4;              // each emitter column fans across ~N segment-widths -> stripes merge into sheets
const WF_TAN   = 0.11;             // tangential launch jitter -> sideways fan / spray, kills the ruler-straight look
const WF_DEPTH = 0.17;             // submersion depth (world units) at which a rim segment gushes at FULL density
const WF_GRAV  = -2.7;             // downward accel (world units / s^2)
const WF_OUT   = 0.34;             // MEAN outward launch (per-particle 0.65..1.35x) — arcs the sheet off the edge
const WF_VY0   = -0.10;            // initial downward speed as it tips over the lip
const WF_FLOOR = TIP_Y - 1.05;     // ~ -2.6: base recycle depth
const WF_HEM   = 1.15;             // per-particle floor spread (world units) -> scattered, non-flat hem
const WF_TFALL = 1.30;             // approx fall time sea->floor; pre-distributes particles at boot (no warm-up)
const WF_LIFE_MAX = 3.0;           // absolute age cap (safety recycle if a particle never reaches its floor)
const WF_COL   = new THREE.Color(0.60, 0.80, 0.99); // cool water-glow (additive)
// Slow drift clock for the emission field. Breaks the uniform ring into
// clusters that migrate around the rim -> "continuous flow", not a flat curtain.
const uWfTime  = uniform(0);

// Shared streak look for BOTH backends: a thin additive billboarded quad, placed
// at posNode, tinted by brightNode (0 = invisible under additive) and faded by
// alphaNode, soft-capped along its length. WebGPU feeds compute-buffer attributes;
// WebGL2 feeds JS-updated InstancedBufferAttributes — same material either way, so
// the falls look identical and the fragile point-sprite path is gone.
function buildStreakMaterial(posNode, alphaNode, brightNode) {
  const mat = new THREE.MeshBasicNodeMaterial();
  mat.transparent = true;
  mat.depthWrite  = false;
  mat.blending    = THREE.AdditiveBlending;
  mat.side        = THREE.DoubleSide;
  const cap = uv().y.mul(PI).sin(); // 0 at both ends, 1 mid -> rounded streak
  mat.colorNode   = vec3(WF_COL.r, WF_COL.g, WF_COL.b).mul(brightNode);
  mat.opacityNode = cap.mul(alphaNode).mul(0.34);
  mat.vertexNode  = billboarding({ position: posNode });
  return mat;
}

function buildWaterfallGPU() {
  const N = WF_COUNT;
  const posBuf  = instancedArray(N, 'vec3');
  const velBuf  = instancedArray(N, 'vec3');
  const lifeBuf = instancedArray(N, 'vec4'); // x=age  y=alpha  z=perParticleFloor  w=brightness(0=inactive)

  // Static rim-height table, indexed by emitter slot (= instance % SEGS).
  const rimHeights = uniformArray(Array.from(rimY), 'float');
  const uSegs = uint(SEGS);

  // Emission field: drifting lobes around the ring. A rim segment only gushes
  // where this is high, and the lobes migrate with uWfTime -> the falls cluster
  // and wander instead of firing as one flat, even ring. Integer angular
  // frequencies keep it seamless across the 0/2π wrap.
  const wfField = (theta) => {
    const t = uWfTime;
    const a = theta.mul(3.0).add(t.mul(0.25)).sin().mul(0.60);
    const b = theta.mul(7.0).sub(t.mul(0.17)).sin().mul(0.32);
    const c = theta.mul(13.0).add(t.mul(0.11)).sin().mul(0.22);
    const raw = a.add(b).add(c).mul(0.5).add(0.5);        // ~0..1
    return smoothstep(float(0.30), float(0.80), raw);      // patches with real gaps
  };

  // Shared spawn: launch off the home segment's lip, jittered into a sheet, and
  // LATCH whether this particle is active (rim submerged × field lobe) so a fall,
  // once started, completes — the active SET drifts as new particles spawn.
  const spawn = (position, velocity, life) => {
    const slot  = instanceIndex.mod(uSegs);
    const base  = float(slot).div(float(SEGS)).mul(PI.mul(2));
    const theta = base.add(hash(instanceIndex.add(uint(3))).sub(0.5).mul(WF_SEGW * WF_SPREAD));
    const rr    = float(WF_R).add(hash(instanceIndex.add(uint(7))).sub(0.5).mul(0.05));
    const seed  = hash(instanceIndex.add(uint(23)));
    const seed2 = hash(instanceIndex.add(uint(67)));
    const tang  = hash(instanceIndex.add(uint(41))).sub(0.5).mul(WF_TAN);
    const outv  = float(WF_OUT).mul(hash(instanceIndex.add(uint(53))).mul(0.7).add(0.65)); // 0.65..1.35x
    const ct = cos(theta), st = sin(theta);

    const rimH   = rimHeights.element(slot);
    const depth  = smoothstep(float(0.0), float(WF_DEPTH), uSeaLevel.sub(rimH)); // rim submersion 0..1
    const active = seed.lessThan(depth.mul(wfField(base)));                       // stochastic gate

    position.x = ct.mul(rr);
    position.z = st.mul(rr);
    position.y = uSeaLevel.add(0.01);
    velocity.x = ct.mul(outv).sub(st.mul(tang)); // radial out + tangential fan
    velocity.z = st.mul(outv).add(ct.mul(tang));
    velocity.y = float(WF_VY0).mul(seed.mul(0.6).add(0.7));
    life.x = float(0);
    life.y = float(0);
    life.z = float(WF_FLOOR).add(seed2.mul(WF_HEM));                 // per-particle floor -> scattered hem
    life.w = active.select(seed.mul(0.5).add(0.55), float(0.0));     // brightness, 0 when inactive
  };

  const computeInit = Fn(() => {
    const position = posBuf.element(instanceIndex);
    const velocity = velBuf.element(instanceIndex);
    const life     = lifeBuf.element(instanceIndex);
    spawn(position, velocity, life);
    // Pre-distribute along the ballistic fall so the cascade is full on frame 1
    // (no bunched-at-the-lip warm-up). Closed form for constant gravity.
    const t = hash(instanceIndex.add(uint(11))).mul(WF_TFALL);
    position.addAssign(velocity.mul(t));                                // linear term (uses v0)
    position.y = position.y.add(float(0.5 * WF_GRAV).mul(t).mul(t));    // + ½ g t²
    velocity.y = velocity.y.add(float(WF_GRAV).mul(t));                 // v(t) = v0 + g t
    life.x = t;
  })().compute(N);

  const computeUpdate = Fn(() => {
    const position = posBuf.element(instanceIndex);
    const velocity = velBuf.element(instanceIndex);
    const life     = lifeBuf.element(instanceIndex);

    velocity.addAssign(vec3(0, WF_GRAV, 0).mul(deltaTime));
    position.addAssign(velocity.mul(deltaTime));
    life.x = life.x.add(deltaTime);

    const pFloor  = life.z;
    const fadeIn  = smoothstep(float(0.0), float(0.10), life.x);
    const disperse= smoothstep(pFloor, pFloor.add(0.9), position.y).mul(0.6).add(0.4); // thin toward its own floor
    life.y = fadeIn.mul(disperse);

    const dead = position.y.lessThan(pFloor).or(life.x.greaterThan(float(WF_LIFE_MAX)));
    If(dead, () => { spawn(position, velocity, life); });
  })().compute(N);

  renderer.computeAsync(computeInit);

  const life = lifeBuf.toAttribute();
  const mat  = buildStreakMaterial(posBuf.toAttribute(), life.y, life.w);
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(0.010, 0.20), mat); // thin + long -> reads as falling water
  mesh.count = N;
  mesh.frustumCulled = false;  // per-frame GPU-written positions -> stale bounds would cull
  mesh.renderOrder = 11;       // after the sea (renderOrder 10)
  scene.add(mesh);

  return { object: mesh, mode: 'gpu', update() { renderer.compute(computeUpdate); } };
}

function buildWaterfallCPU() {
  const N = WF_COUNT;
  // Instanced billboarded quads (NOT THREE.Points): the node point-sprite/size
  // path is unreliable on the WebGL2 backend, which is exactly where this runs.
  // Same PlaneGeometry + billboarding as the GPU path; per-instance data comes
  // from JS-updated InstancedBufferAttributes.
  const geo     = new THREE.PlaneGeometry(0.010, 0.20);
  const aPos    = new THREE.InstancedBufferAttribute(new Float32Array(N * 3), 3);
  const aAlpha  = new THREE.InstancedBufferAttribute(new Float32Array(N), 1);
  const aBright = new THREE.InstancedBufferAttribute(new Float32Array(N), 1);
  aPos.setUsage(THREE.DynamicDrawUsage);
  aAlpha.setUsage(THREE.DynamicDrawUsage);
  geo.setAttribute('aPos', aPos);
  geo.setAttribute('aAlpha', aAlpha);
  geo.setAttribute('aBright', aBright);
  const pos = aPos.array, alpha = aAlpha.array, bright = aBright.array;

  const vel    = new Float32Array(N * 3);
  const age    = new Float32Array(N);
  const slot   = new Int32Array(N);
  const pFloor = new Float32Array(N);
  const active = new Uint8Array(N);
  const sm = THREE.MathUtils.smoothstep;

  // Same drifting emission field as the GPU path (see wfField there).
  const field = (theta, t) => sm(
    0.5 + 0.5 * ( Math.sin(theta * 3  + t * 0.25) * 0.60
                + Math.sin(theta * 7  - t * 0.17) * 0.32
                + Math.sin(theta * 13 + t * 0.11) * 0.22 ),
    0.30, 0.80);

  // Mirror of GPU spawn(): jittered sheet launch + latched active/floor/brightness.
  const spawn = (i, sea, t) => {
    slot[i] = i % SEGS;
    const base  = (slot[i] / SEGS) * Math.PI * 2;
    const theta = base + (Math.random() - 0.5) * WF_SEGW * WF_SPREAD;
    const rr    = WF_R + (Math.random() - 0.5) * 0.05;
    const seed  = Math.random();
    const tang  = (Math.random() - 0.5) * WF_TAN;
    const outv  = WF_OUT * (0.65 + Math.random() * 0.7);
    const c = Math.cos(theta), s = Math.sin(theta);
    pos[i*3] = c*rr; pos[i*3+1] = sea + 0.01; pos[i*3+2] = s*rr;
    vel[i*3] = c*outv - s*tang; vel[i*3+1] = WF_VY0 * (0.7 + seed*0.6); vel[i*3+2] = s*outv + c*tang;
    pFloor[i] = WF_FLOOR + Math.random() * WF_HEM;
    const depth = 1 - sm(rimY[slot[i]], sea - WF_DEPTH, sea);   // rim submersion 0..1
    active[i] = seed < depth * field(base, t) ? 1 : 0;
    bright[i] = active[i] ? 0.55 + seed * 0.5 : 0;              // 0 -> invisible under additive
  };

  const sea0 = uSeaLevel.value;
  for (let i = 0; i < N; i++) {
    spawn(i, sea0, 0);
    // pre-distribute along the ballistic fall (no warm-up bunching)
    const t = Math.random() * WF_TFALL;
    pos[i*3]   += vel[i*3]   * t;
    pos[i*3+1] += vel[i*3+1] * t + 0.5 * WF_GRAV * t * t;
    pos[i*3+2] += vel[i*3+2] * t;
    vel[i*3+1] += WF_GRAV * t;
    age[i] = t;
  }

  const mat  = buildStreakMaterial(attribute('aPos'), attribute('aAlpha'), attribute('aBright'));
  const mesh = new THREE.Mesh(geo, mat);
  mesh.count = N;               // draw N instances (same "Mesh + count" trick as the GPU path)
  mesh.frustumCulled = false;
  mesh.renderOrder = 11;
  scene.add(mesh);

  return {
    object: mesh, mode: 'cpu',
    update(dt) {
      const sea = uSeaLevel.value;
      const t = uWfTime.value;
      for (let i = 0; i < N; i++) {
        age[i] += dt;
        vel[i * 3 + 1] += WF_GRAV * dt;
        pos[i * 3]     += vel[i * 3]     * dt;
        pos[i * 3 + 1] += vel[i * 3 + 1] * dt;
        pos[i * 3 + 2] += vel[i * 3 + 2] * dt;
        const fadeIn   = sm(age[i], 0, 0.10);
        const disperse = 0.4 + 0.6 * sm(pos[i * 3 + 1], pFloor[i], pFloor[i] + 0.9);
        alpha[i] = active[i] ? fadeIn * disperse : 0;
        if (pos[i * 3 + 1] < pFloor[i] || age[i] > WF_LIFE_MAX) { spawn(i, sea, t); age[i] = 0; alpha[i] = 0; }
      }
      aPos.needsUpdate = true;
      aAlpha.needsUpdate = true;
      aBright.needsUpdate = true;
    }
  };
}

let waterfall;
if (isWebGPU) {
  try { waterfall = buildWaterfallGPU(); }
  catch (err) { log('waterfall GPU compute failed -> CPU fallback:', err); waterfall = buildWaterfallCPU(); }

/* ============================================================
   STEP 2 — MOON + DAY CYCLE
   Moon rides the anti-sun axis: rises as the sun sets.
   Cool directional moonlight fades in at night.
   ============================================================ */
const moonMat = new THREE.MeshBasicNodeMaterial();
moonMat.colorNode = Fn(() => {
  const p = positionLocal.mul(0.15);
  const mottle = mx_noise_float(p).mul(0.5).add(0.5).mul(0.25)
           .add(mx_noise_float(p.mul(3.7)).mul(0.5).add(0.5).mul(0.12));
  return vec3(0.82, 0.84, 0.90).mul(float(0.75).add(mottle));
})();
const moon = new THREE.Mesh(new THREE.SphereGeometry(28, 32, 16), moonMat);

/* ============================================================
   STEP 6 — UNDER-DISC FOG (faint atmosphere beneath the world)
   A soft additive, camera-billboarded glow blob sitting just
   under the disc. depthTest stays ON (depthWrite off) so the
   disc body occludes it — the haze reads as a halo peeking out
   below/around the rim, where the waterfalls dissipate into the
   void, matching the concept art's misted base. Cheapest possible
   volumetric stand-in: one transparent quad. Gated off by the
   Quest preset.
   ============================================================ */
const uFogStrength = uniform(0.5);
const FOG_COL = new THREE.Color(0.34, 0.52, 0.86);
const fogMat = new THREE.MeshBasicNodeMaterial();
fogMat.transparent = true;
fogMat.depthWrite  = false;
fogMat.blending    = THREE.AdditiveBlending;
fogMat.side        = THREE.DoubleSide;
const fogR    = length(uv().sub(0.5)).mul(2.0);            // 0 centre -> 1 edge
const fogGlow = clamp(float(1.0).sub(fogR), float(0.0), float(1.0));
const fogSoft = fogGlow.mul(fogGlow);                      // soft radial falloff
fogMat.colorNode   = vec3(FOG_COL.r, FOG_COL.g, FOG_COL.b).mul(fogSoft).mul(uFogStrength);
fogMat.opacityNode = fogSoft;                             // additive; opacity shapes the edge
// A FLAT horizontal glow lying in the ground plane under the disc — NOT a
// camera-billboard (billboarding spun the card to face the viewer, so orbiting
// read as "wrong rotation"). Laid flat, it's a fixed radial haze under the world.
const fogMesh = new THREE.Mesh(new THREE.PlaneGeometry(9.0, 9.0), fogMat);
fogMesh.rotation.x = -Math.PI / 2;                        // lie flat in XZ
fogMesh.position.set(0, -1.75, 0);                        // just below the skirt tip (TIP_Y -1.55)
scene.add(fogMesh);

/* ============================================================
   CAMERA + CONTROLS
   ============================================================ */
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(0, 2.4, 5.6);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

controls.minDistance = 1.5;

/* ============================================================
   STEP 4.2 — LINEAR SCENE PASS (refraction tone-map fix)
   Direct-to-canvas rendering writes AgX-graded color to the
   framebuffer, so viewportSharedTexture samples already-graded
   pixels → the water re-applies AgX → refracted body glows
   washed-out (visible as milky-bright sea at night). A
   PostProcessing pass renders the scene to a LINEAR buffer and
   applies tone mapping exactly once at the output transform,
   so the refraction backdrop is sampled linear and absorption
   math is physically honest too. Pipeline rule #2, resolved.

   Routed in ONLY when refraction is live (see render loop):
   depth-FX-only and low tier keep the cheaper direct path and
   pay nothing for a pass they don't need. AgX + exposure are
   still honored by the output transform, so the slider works
   unchanged; opaque terrain/sky look identical on both paths.
   ============================================================ */
const usesRefraction = () => waterOpts.depthFX && waterOpts.refraction;

/* ============================================================
   STEP 6 — POST STACK (bloom · punchy grade · FXAA · Quest preset)
   All routed through the ONE scene pass() that already existed
   for refraction (§12). Bloom is now baseline on every tier
   (incl. Quest), so this pass is ALWAYS used — the cheaper
   direct renderer.render() path is retired (see §16).

   Pipeline order is load-bearing (this project has been bitten
   by double tone-mapping twice — rule #2):
     sceneColor (LINEAR)
       + bloom(sceneColor)        ← linear, additive glow
       → renderOutput()           ← AgX + sRGB applied EXACTLY once
       → graded()                 ← "punchy" look (sat/contrast), display space
       → fxaa()                   ← AA must run in display space
   outputColorTransform is turned OFF because renderOutput() now
   owns the single tone-map (pinned from the r180 bloom + fxaa
   examples). Bloom "selects" by luminance threshold in linear
   space: the ×30 sun disc and the additive waterfalls clear it,
   lit terrain mostly doesn't. (If sunlit snow blooms undesirably
   on-device, the upgrade is MRT bloomIntensity — pattern pinned
   from webgpu_postprocessing_bloom_selective; deferred to keep
   the Quest tier off a second render target.)
   ============================================================ */
const postFX = new THREE.PostProcessing(renderer);
postFX.outputColorTransform = false; // renderOutput() owns the single tone-map

const scenePass  = pass(scene, camera);
const sceneColor = scenePass.getTextureNode(); // linear HDR scene color

// ---- bloom (params live as uniforms on the node; graded live below) ----
const bloomPass = bloom(sceneColor, /*strength*/ 0.70, /*radius*/ 0.60, /*threshold*/ 1.30);

// ---- "Punchy" look grade (display space, applied AFTER tone-map) ----
// The sacred-minimalist scene wants a bold, saturated read. One uPunch knob
// drives saturation + contrast + a touch of gain, from neutral (0) → punchy (1).
// Cheap (a few ALU ops), so it stays on even in the Quest preset.
const uPunch = uniform(0.75);
function graded(cNode) {
  const c    = cNode.rgb;
  const lum  = dot(c, vec3(0.2126, 0.7152, 0.0722));
  const sat  = float(1.0).add(uPunch.mul(0.38));   // saturation up to +38%
  const con  = float(1.0).add(uPunch.mul(0.24));   // contrast up to +24% (around mid grey)
  const gain = float(1.0).add(uPunch.mul(0.06));   // slight overall lift
  let g = mix(vec3(lum), c, sat);                  // saturate around luma
  g = mix(vec3(0.5), g, con);                      // contrast around 0.5
  g = g.mul(gain);
  return vec4(clamp(g, 0.0, 1.0), cNode.a);
}

// ---- effect flags + graph (re)composition ----
const postOpts = { fxaa: TIER.antialias, rim: 0.5, fog: 0.5, quest: false };

function rebuildPost() {
  const linear = sceneColor.add(bloomPass);                    // bloom = baseline (Quest keeps it)
  let out = renderOutput(linear);                              // AgX + sRGB, once
  out = graded(out);                                           // "punchy" look — always on (cheap; Quest keeps it)
  if (!postOpts.quest && postOpts.fxaa) out = fxaa(out);       // AA in display space, last
  postFX.outputNode = out;
}

// rim glow + under-disc fog are scene-space (uniform / visibility), so the
// Quest preset gates them without touching the post graph.
function applyPostGating() {
  const full = !postOpts.quest;
  uRimStrength.value = full ? postOpts.rim : 0.0;
  uFogStrength.value = full ? postOpts.fog : 0.0;
  fogMesh.visible    = full && postOpts.fog > 0.0;
}
rebuildPost();
applyPostGating();

/* ============================================================
   MYSTICAL MUSIC — generative "tintinnabuli" (ORIGINAL)
   Arvo Pärt's tintinnabuli is a *technique*, not a piece: a
   stepwise melodic voice (M-voice) shadowed by a voice that only
   ever sounds notes of the tonic triad (T-voice). This is an
   original generative realisation of that idea — no existing
   composition is reproduced. Slow, bell-like, sacred; A minor
   with a root+fifth drone. Pure Web Audio (no deps / no audio
   files — the reverb impulse is synthesised). Starts on the
   Music checkbox, which supplies the required user gesture.
   ============================================================ */
const Music = (() => {
  const KEY   = 57;                 // A3 tonic (MIDI)
  const SCALE = [0, 2, 3, 5, 7, 8, 10]; // natural minor (Aeolian)
  const TRIAD = [0, 3, 7];          // tonic minor triad (A, C, E)
  const midi  = (deg) => {          // scale degree (may exceed an octave) -> MIDI
    const oct = Math.floor(deg / SCALE.length);
    const idx = ((deg % SCALE.length) + SCALE.length) % SCALE.length;
    return KEY + oct * 12 + SCALE[idx];
  };
  const hz = (m) => 440 * Math.pow(2, (m - 69) / 12);
  // T-voice: nearest tonic-triad pitch at/above the M-voice note (1st position, superior)
  const tVoice = (m) => {
    for (let k = 0; k < 24; k++)
      if (TRIAD.includes((((m + k) - KEY) % 12 + 12) % 12)) return m + k;
    return m;
  };

  let ctx = null, master = null, verb = null, lp = null, drone = [], timer = null, deg = 7, running = false;

  function makeIR(seconds, decay) {          // synthesised hall impulse (no external file)
    const rate = ctx.sampleRate, len = Math.floor(rate * seconds);
    const buf = ctx.createBuffer(2, len, rate);
    for (let ch = 0; ch < 2; ch++) {
      const d = buf.getChannelData(ch);
      for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
    }
    return buf;
  }

  function voice(m, when, dur, peak, type, detune) {
    const o = ctx.createOscillator();
    o.type = type; o.frequency.value = hz(m); o.detune.value = detune || 0;
    const g = ctx.createGain();
    const a = 0.9, r = Math.min(3.5, dur * 0.8); // slow attack, long release
    g.gain.setValueAtTime(0.0001, when);
    g.gain.exponentialRampToValueAtTime(peak, when + a);
    g.gain.setValueAtTime(peak, when + Math.max(a, dur - r));
    g.gain.exponentialRampToValueAtTime(0.0001, when + dur);
    o.connect(g); g.connect(lp); g.connect(verb);  // dry + wet
    o.start(when); o.stop(when + dur + 0.05);
  }

  function schedule() {
    const now = ctx.currentTime;
    const dur = 3.2 + Math.random() * 2.2;         // long, meditative
    const m   = midi(deg);
    voice(m,         now, dur, 0.16, 'triangle', 0);  // M-voice
    voice(m,         now, dur, 0.05, 'sine',    +6);  // faint shimmer partial
    voice(tVoice(m), now, dur, 0.11, 'sine',     0);  // T-voice (triad bell)
    const step = (Math.random() < 0.72) ? (Math.random() < 0.5 ? -1 : 1)
                                        : (Math.random() < 0.5 ? -2 : 2); // mostly stepwise
    deg += step;
    if (deg > 15) deg -= 4;
    if (deg < 2)  deg += 4;
    timer = setTimeout(schedule, dur * (0.55 + Math.random() * 0.25) * 1000); // overlap tails
  }

  function start() {
    if (running) return; running = true;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.resume) ctx.resume();
    master = ctx.createGain(); master.gain.value = 0.0001;
    lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 3600; lp.Q.value = 0.4;
    verb = ctx.createConvolver(); verb.buffer = makeIR(4.5, 3.0);
    const verbGain = ctx.createGain(); verbGain.gain.value = 0.9;
    lp.connect(master); verb.connect(verbGain); verbGain.connect(master); master.connect(ctx.destination);
    master.gain.exponentialRampToValueAtTime(0.5, ctx.currentTime + 4); // gentle fade-in
    [45, 52].forEach((dm, i) => {                  // sustained drone: A2 root + E3 fifth
      const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = hz(dm);
      const g = ctx.createGain(); g.gain.value = i === 0 ? 0.05 : 0.035;
      o.connect(g); g.connect(lp); g.connect(verb); o.start(); drone.push(o);
    });
    schedule();
  }

  function stop() {
    if (!running) return; running = false;
    if (timer) clearTimeout(timer);
    if (ctx) {
      const t = ctx.currentTime;
      try {
        master.gain.cancelScheduledValues(t);
        master.gain.setValueAtTime(master.gain.value, t);
        master.gain.exponentialRampToValueAtTime(0.0001, t + 2.5);
      } catch (e) {}
      drone.forEach(o => { try { o.stop(t + 2.6); } catch (e) {} });
      const dead = ctx;
      setTimeout(() => { try { dead.close(); } catch (e) {} }, 3000);
      ctx = null; drone = [];
    }
  }
  return { start, stop };
})();

// ---- Step 6: post + atmosphere wiring ----

/* ============================================================
   PERF HUD + MAIN LOOP
   ============================================================ */
const perfEl = document.getElementById('perf');
let frames = 0, perfLast = performance.now(), msAccum = 0;
let prev = performance.now();

renderer.setAnimationLoop(() => {
  const now = performance.now();
  const dt = (now - prev) / 1000;
  const frameMs = now - prev;
  prev = now;

  if (els.cycle.checked) {
    dayPhase = (dayPhase + dt * 4.0) % 360; // 90s per day
    const elDeg = Math.sin(THREE.MathUtils.degToRad(dayPhase)) * 45 + 10;
    els.az.value = dayPhase.toFixed(0);
    els.el.value = elDeg.toFixed(0);
    setSun(dayPhase, elDeg);
  }

  if (envDirty && now - lastBake > TIER.bakeMs) {
    bakeEnvironment();
    lastBake = now;
    envDirty = false;
  }

  if (waterfall.object.visible) {
    const wdt = Math.min(dt, 0.05);   // clamp so a stalled frame can't teleport particles past their floor
    uWfTime.value += wdt;             // drives the drifting emission field (GPU + CPU)
    waterfall.update(wdt);            // GPU: dispatch compute · CPU: step points
  }

  controls.update();
  // Step 6: bloom is baseline on every tier, so the scene pass is always used.
  // Water refraction still samples this pass's LINEAR buffer; renderOutput()
  // applies AgX exactly once at the tail (§16). The old direct render() path
  // (cheaper, no post) is retired now that bloom ships on all tiers.
  postFX.render();

  frames++;
  msAccum += frameMs;
  if (now - perfLast > 500) {
    const fps = Math.round(frames * 1000 / (now - perfLast));
    const ms = (msAccum / frames).toFixed(1);
    perfEl.textContent = `${fps} fps · ${ms} ms`;
    frames = 0; msAccum = 0; perfLast = now;
  }
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
